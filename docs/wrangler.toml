# Cloudflare Pages project configuration for the Takosumi VitePress site.
#
# This file is consumed by the Pages CI deploy step and by `wrangler pages
# deploy` for local pushes. The build command runs at the repo root via the
# `docs:build` Deno task; the resulting `.vitepress/dist` directory is the
# Pages build output.
#
# Operator-side prerequisites (not committed):
#   - GitHub secrets: CLOUDFLARE_API_TOKEN (Pages write), CLOUDFLARE_ACCOUNT_ID
#   - Cloudflare Pages project named `takosumi-docs` (created via dashboard or
#     `wrangler pages project create takosumi-docs`)
#
# Custom domain: `docs.takosumi.com` is wired via the Cloudflare Pages
# dashboard (Custom domains → Set up a custom domain). Once active, the
# site is reachable at https://docs.takosumi.com/. The default
# `takosumi-docs.pages.dev` host stays available for preview deploys.
name = "takosumi-docs"
compatibility_date = "2026-05-03"
pages_build_output_dir = "./.vitepress/dist"
