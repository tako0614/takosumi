# Bun migration: install the Deno runtime compat globals before any module
# evaluates, so existing Deno.* runtime call sites in src work under bun without
# source edits. A few legacy script guard tests still register via Deno.test, so
# the test preload maps those registrations onto bun:test.
[test]
preload = ["./shims/deno-compat.ts", "./shims/deno-test-preload.ts"]

[run]
preload = ["./shims/deno-compat.ts"]
