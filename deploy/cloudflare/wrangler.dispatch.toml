# Takosumi tenant dynamic dispatch Worker for Workers for Platforms.
# This Worker intentionally has no provider credentials, Deploy Control token,
# state backend credential, D1 admin binding, or R2 admin binding.

name = "takosumi-tenant-dispatch"
main = ".wrangler/dist/takosumi-wfp-dispatch-worker.mjs"
compatibility_date = "2026-04-15"
workers_dev = false
no_bundle = true

[build]
command = 'ROOT=.; if [ ! -f "$ROOT/deploy/cloudflare/wrangler.dispatch.toml" ]; then ROOT=../..; fi; mkdir -p "$ROOT/deploy/cloudflare/.wrangler/dist" && bun build --target browser --format esm "$ROOT/deploy/cloudflare/src/wfp_dispatch_worker.ts" --outfile "$ROOT/deploy/cloudflare/.wrangler/dist/takosumi-wfp-dispatch-worker.mjs"'
watch_dir = "deploy/cloudflare/src"

[observability]
enabled = true

[[dispatch_namespaces]]
binding = "TAKOSUMI_TENANT_DISPATCH"
namespace = "takosumi-tenants"

[vars]
TAKOSUMI_WFP_DISPATCH_MODE = "tenant-runtime"
