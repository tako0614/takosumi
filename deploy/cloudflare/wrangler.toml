# Takosumiflare Worker provider scaffold.
# Replace placeholder resource identifiers and secrets from operator-managed config before deploy.

name = "takosumiflare-provider"
main = ".wrangler/dist/takosumiflare-worker.mjs"
compatibility_date = "2026-04-15"
workers_dev = false
compatibility_flags = ["nodejs_compat"]
no_bundle = true

[build]
command = 'ROOT=.; if [ ! -f "$ROOT/deploy/cloudflare/wrangler.toml" ]; then ROOT=../..; fi; mkdir -p "$ROOT/deploy/cloudflare/.wrangler/dist" && bun build --target browser --format esm "$ROOT/deploy/cloudflare/src/worker.ts" --outfile "$ROOT/deploy/cloudflare/.wrangler/dist/takosumiflare-worker.mjs"'
watch_dir = "deploy/cloudflare/src"

[observability]
enabled = true

[[d1_databases]]
binding = "TAKOS_D1"
database_name = "takosumi"
database_id = "<cloudflare-d1-database-id>"

[[r2_buckets]]
binding = "TAKOS_ARTIFACTS"
bucket_name = "takos-artifacts"

[[queues.producers]]
binding = "TAKOS_QUEUE"
queue = "takosumi-control-plane"

[[queues.consumers]]
queue = "takosumi-control-plane"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "takosumi-control-plane-dlq"

[[durable_objects.bindings]]
name = "TAKOS_COORDINATION"
class_name = "TakosCoordinationObject"

[vars]
TAKOS_RUNTIME_MODE = "cloudflare-worker"
TAKOSUMI_ENVIRONMENT = "staging"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TakosCoordinationObject"]
