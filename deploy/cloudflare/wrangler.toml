# Takosumi Cloudflare Worker + Cloudflare Containers runner profile.
# Replace placeholder resource identifiers and secrets from operator-managed config before deploy.

name = "takosumi-cloudflare"
main = ".wrangler/dist/takosumi-cloudflare-worker.mjs"
compatibility_date = "2026-04-15"
workers_dev = false
compatibility_flags = ["nodejs_compat"]
no_bundle = true

[build]
command = 'ROOT=.; if [ ! -f "$ROOT/deploy/cloudflare/wrangler.toml" ]; then ROOT=../..; fi; mkdir -p "$ROOT/deploy/cloudflare/.wrangler/dist" && bun build --target browser --format esm --external cloudflare:workers "$ROOT/worker/src/index.ts" --outfile "$ROOT/deploy/cloudflare/.wrangler/dist/takosumi-cloudflare-worker.mjs"'
watch_dir = "worker/src"

[observability]
enabled = true

[[d1_databases]]
binding = "TAKOSUMI_CONTROL_DB"
database_name = "takosumi"
database_id = "<cloudflare-d1-database-id>"

[[r2_buckets]]
binding = "R2_ARTIFACTS"
bucket_name = "takos-artifacts"

[[r2_buckets]]
binding = "R2_SOURCE"
bucket_name = "takosumi-source"

[[r2_buckets]]
binding = "R2_STATE"
bucket_name = "takosumi-state"

[[r2_buckets]]
binding = "R2_BACKUPS"
bucket_name = "takosumi-backups"

[[queues.producers]]
binding = "RUN_QUEUE"
queue = "takosumi-runs"

# Async OpenTofu run lifecycle. The create path persists the run `queued` and
# returns; this consumer validates an identity-only message, stores it in the
# per-run RUN_OWNER Durable Object, and acks quickly. RUN_OWNER then mints
# credentials through the controller path, drives the container DO, and owns
# retry/final-failure handling outside the queue delivery lifetime. One run per
# delivery (max_batch_size = 1) keeps scheduling failures isolated.
[[queues.consumers]]
queue = "takosumi-runs"
max_batch_size = 1
max_batch_timeout = 1
max_retries = 2
dead_letter_queue = "takosumi-runs-dlq"

# Dead-letter consumer: marks runs that exhausted retries failed
# ("retries-exhausted") if not already terminal.
[[queues.consumers]]
queue = "takosumi-runs-dlq"
max_batch_size = 10
max_batch_timeout = 5

[[durable_objects.bindings]]
name = "COORDINATION"
class_name = "CoordinationObject"

[[durable_objects.bindings]]
name = "RUN_OWNER"
class_name = "OpenTofuRunOwnerObject"

[[durable_objects.bindings]]
name = "RUNNER"
class_name = "OpenTofuRunnerObject"

[vars]
TAKOSUMI_RUNTIME_MODE = "cloudflare-worker"
TAKOSUMI_ENVIRONMENT = "staging"
TAKOSUMI_RUN_MODEL = "opentofu-plan-apply-destroy"
R2_ARTIFACTS_BUCKET_NAME = "takos-artifacts"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CoordinationObject"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["OpenTofuRunnerObject"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["OpenTofuRunOwnerObject"]

# OpenTofu run executor. The embedded Takosumi service calls this
# container-backed Durable Object through its OpenTofu runner adapter.
[[containers]]
class_name = "OpenTofuRunnerObject"
# Build context is the repo root so the runner can COPY the dependency-free
# shared provider->env-name table (contract/provider-env-rules.ts) it
# imports. The Dockerfile copies only that file plus runner/entrypoint.ts; no other
# repo source is included in the image.
image = "runner/Dockerfile"
image_build_context = "../.."
# Custom sizing: the runner image bakes an OpenTofu provider filesystem mirror
# and each run materializes a per-run workspace (source checkout + build
# artifact + generated root + tofu provider cache + state). 2 vCPU / 6 GiB RAM
# headroom for tofu init/plan/apply + the optional Bun build phase; 10 GB disk
# for the mirror + workspace scratch.
instance_type = { vcpu = 2, memory_mib = 6144, disk_mb = 10240 }
max_instances = 10
