# Kubernetes pod via k3d (or any Kubernetes cluster). Requires
# TAKOSUMI_KUBERNETES_API_SERVER_URL + TAKOSUMI_KUBERNETES_BEARER_TOKEN
# in .env. With --emulators k3d profile, kubeconfig is dumped to
# k3d-output volume.
apiVersion: takosumi.takos.jp/v1
kind: Manifest
metadata:
  id: k3s-hello
  generation: 1
spec:
  resources:
    - id: hello
      shape:
        id: web-service
        version: v1
      provider: "@takos/kubernetes-k3s-deployment"
      spec:
        image: nginx:alpine
        port: 80
        replicas: 1
