# AWS S3 bucket. Requires AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY in .env
# OR --emulators localstack profile (which fronts an S3-compatible API at
# http://localstack:4566). The connector's hostname is rewritten via the
# DNS alias on the localstack service, so the connector code path is the
# real AwsS3Connector either way.
apiVersion: takosumi.takos.jp/v1
kind: Manifest
metadata:
  id: aws-s3-bucket
  generation: 1
spec:
  resources:
    - id: hello-bucket
      shape:
        id: object-store
        version: v1
      provider: "@takos/aws-s3"
      spec:
        bucketName: takos-local-hello-bucket
