# Minimal hello-world deploy via the always-on selfhost connectors.
# Should apply with no .env credentials configured.
apiVersion: takosumi.takos.jp/v1
kind: Manifest
metadata:
  id: hello-selfhost
  generation: 1
spec:
  resources:
    - id: hello
      shape:
        id: web-service
        version: v1
      provider: "@takos/selfhost-docker-compose"
      spec:
        image: nginx:alpine
        port: 80
