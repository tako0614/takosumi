# Phase 1 — Takosumi integration test bed on top of Phase 0 ingress.
#
# Scope: Takosumi 製品群のみ (cloud Bun service + the single composed platform
# worker (deploy/platform/worker.ts) + dashboard SPA)。 Takos product (takos-app /
# takos-git) と yurucommu の direct service は外してある。 各 product
# の動作確認は各 repo 内の test に委ねる。
#
# Profiles:
#   postgres   Takosumi cloud (Bun + Postgres + MinIO) serving app.takosumi.test
#              + the composed platform worker (Miniflare mirror)
#   workers    The composed platform worker (workerd / Miniflare + D1 + R2 + DO
#              + queue) as the primary Worker-backed code path
#
# Source mount + Bun command pattern を採用 (image build 不要)。 production
# image でないのは「test bed」 のために意図的。 ファイル変更が即反映される。

services:
  # ---- 共通 storage / queue ----
  substrate-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: takos
      POSTGRES_PASSWORD: takos
      POSTGRES_DB: takosumi_app
    volumes:
      - substrate-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U takos -d takosumi_app"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      takos-local-internal:
        aliases:
          - postgres

  substrate-postgres-init:
    image: postgres:16-alpine
    restart: "no"
    depends_on:
      substrate-postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: takos
    entrypoint:
      - /bin/sh
      - -c
      - |
        until pg_isready -h postgres -U takos -d postgres; do sleep 1; done
        for db in takosumi_app takosumi takosumi_accounts; do
          psql -h postgres -U takos -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='$$db'" \
            | grep -q 1 \
            || psql -h postgres -U takos -d postgres -c "CREATE DATABASE $$db"
        done
    networks:
      - takos-local-internal

  substrate-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - substrate-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      takos-local-internal:
        aliases:
          - redis

  substrate-minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-takos}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-takos-minio-pw}
    volumes:
      - substrate-minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "test -f /data/.minio.sys/format.json"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      takos-local-internal:
        aliases:
          - minio

  substrate-minio-init:
    image: minio/mc:latest
    depends_on:
      substrate-minio:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set takos http://minio:9000 \
          "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do sleep 1; done
        mc mb --ignore-existing takos/takosumi
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-takos}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-takos-minio-pw}
    networks:
      - takos-local-internal

  # ---- Takosumi Accounts (OIDC issuer) ----

  cloud-migrate:
    image: oven/bun:1
    restart: "no"
    depends_on:
      substrate-postgres-init:
        condition: service_completed_successfully
    working_dir: /workspace
    command:
      - sh
      - -c
      - |
        set -e
        DATABASE_URL="$$TAKOSUMI_ACCOUNTS_DATABASE_URL" \
        bun core/scripts/db-migrate.ts --env=production
        bun cli/src/main.ts accounts migrate \
          --database-url "$$TAKOSUMI_ACCOUNTS_DATABASE_URL"
        bun deploy/local-substrate/scripts/seed-dev-session.ts
    env_file:
      - env/cloud.env
    environment:
      # Per-bring-up dev fixture bearer from scripts/up.sh. Empty (the value when
      # a stack is started with plain `docker compose up`) means no fixture
      # session is seeded at all.
      TAKOSUMI_ACCOUNTS_LOCAL_DEV_SESSION_ID: ${TAKOSUMI_ACCOUNTS_LOCAL_DEV_SESSION_ID:-}
    volumes:
      - ../../../takosumi:/workspace
    networks:
      - takos-local-internal

  # ---- OpenTofu runner container (postgres + workers profiles) ----
  #
  # Runs the same HTTP envelope as the production Cloudflare Container runner,
  # including the baked provider mirror from runner/Dockerfile. The Bun/Postgres
  # cloud process remains the control plane; this service is only the execution
  # sandbox for source sync / plan / apply / destroy.
  opentofu-runner:
    profiles: ["postgres", "workers"]
    build:
      context: ../../../takosumi
      dockerfile: runner/Dockerfile
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - curl
        - -fsS
        - http://127.0.0.1:8080/healthz
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      takos-local-internal:
        aliases:
          - opentofu-runner

  # ---- Takosumi cloud control plane (postgres profile) ----
  #
  # The ONE composed app this profile serves at app.takosumi.test: account
  # plane (OIDC issuer, billing, dashboard, install UI) + the embedded Takosumi
  # service (wrappers/cloud.ts -> buildComposedServer). Mirrors production's one
  # app.takosumi.com; replaces the old separate accounts + service services.
  # Holds NO docker.sock — OpenTofu execution is dispatched to the dedicated
  # runner service. Imports straddle
  # /workspace (takosumi) and /takosumi (the dev-seam @takosjp/takosumi
  # target), run under the takosumi config.
  cloud:
    profiles: ["postgres"]
    image: oven/bun:1
    restart: unless-stopped
    depends_on:
      cloud-migrate:
        condition: service_completed_successfully
      opentofu-runner:
        condition: service_healthy
    working_dir: /workspace
    command:
      - bun
      - /wrappers/cloud.ts
    env_file:
      - env/cloud.env
    environment:
      TAKOSUMI_LOCAL_OPENTOFU_RUNNER_URL: http://opentofu-runner:8080
      TAKOSUMI_ENABLED_RUNNER_PROFILES: opentofu-default
      TAKOSUMI_DEFAULT_RUNNER_PROFILE_ID: opentofu-default
      NODE_EXTRA_CA_CERTS: /local-substrate-runtime/pebble-issuance-root.pem
    volumes:
      - ../../../takosumi:/workspace
      - ../../../takosumi:/takosumi:ro
      - ./wrappers:/wrappers:ro
      - ./caddy/runtime:/local-substrate-runtime
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - "const r = await fetch('http://127.0.0.1:8787/.well-known/openid-configuration'); if(!r.ok) throw new Error('cloud unhealthy')"
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s
    networks:
      takos-local-internal:
        aliases:
          - cloud

  # ---- Takosumi platform worker (Cloudflare Worker profile) ----
  # Builds and runs the SINGLE composed platform worker (deploy/platform/worker.ts
  # — the same entry the operator deploys at app.takosumi.com) under Miniflare
  # with D1/R2/DO/queue bindings. This ends the old dev/prod divergence where the
  # substrate built two separate control-plane-only worker bundles. The postgres profile
  # also starts it as a mirror at service-worker.takosumi.test so default smoke can
  # verify the Worker code path without replacing the Bun+Postgres `cloud` service
  # used by the Takos product stack.
  takosumi-service-worker-build:
    profiles: ["postgres", "workers"]
    image: oven/bun:1
    restart: "no"
    working_dir: /work
    command:
      - sh
      - -c
      - |
        mkdir -p deploy/platform/.wrangler/dist
        bun build \
          --target browser \
          --format esm \
          --external cloudflare:workers \
          --external @cloudflare/containers \
          deploy/platform/worker.ts \
          --outfile deploy/platform/.wrangler/dist/takosumi-platform-worker.mjs
        bun deploy/local-substrate/scripts/render-accounts-d1-migrations.ts \
          deploy/platform/.wrangler/dist/takosumi-accounts-d1-migrations.json
    volumes:
      - ../../../takosumi:/work

  takosumi-service-worker:
    profiles: ["postgres", "workers"]
    build:
      context: .
      dockerfile: wrappers/Dockerfile.miniflare
    restart: unless-stopped
    depends_on:
      takosumi-service-worker-build:
        condition: service_completed_successfully
      oauth-mock:
        condition: service_started
      opentofu-runner:
        condition: service_healthy
    working_dir: /app
    command: ["node", "/app/runner.mjs"]
    env_file:
      - ./env/takosumi-service-worker.env
    environment:
      # Per-bring-up dev fixture bearer from scripts/up.sh. Empty means the
      # LOCAL_SUBSTRATE_TEST_BED seeder creates the fixture account with no
      # replayable session.
      TAKOSUMI_ACCOUNTS_LOCAL_DEV_SESSION_ID: ${TAKOSUMI_ACCOUNTS_LOCAL_DEV_SESSION_ID:-}
    volumes:
      - ../../../takosumi/deploy/platform/.wrangler/dist:/worker:ro
      - ./wrappers/takosumi-platform-worker-runner.mjs:/app/runner.mjs:ro
      - ./caddy/runtime:/local-substrate-runtime:ro
      - takosumi-service-worker-data:/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:8788/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      takos-local-internal:
        aliases:
          - takosumi-service-worker
          - service

  # ---- takosumi landing (SolidStart, mirrors takosumi.com root) ----
  takosumi-website-build:
    profiles: ["postgres", "workers"]
    image: node:22-slim
    restart: "no"
    working_dir: /build/website
    command:
      - sh
      - -c
      - |
        set -eu
        mkdir -p /build/website
        tar -C /source --exclude=node_modules --exclude=.output -cf - . \
          | tar -C /build/website -xf -
        npm ci --no-fund --no-audit
        npm run build
        find /output -mindepth 1 -maxdepth 1 -exec rm -rf {} +
        cp -a .output/. /output/
    volumes:
      - ../../../takosumi/website:/source:ro
      - ../../../takosumi/website/.output:/output

  # ---- takosumi docs (VitePress, mirrors takosumi.com/docs/) ----
  takosumi-docs-build:
    profiles: ["postgres", "workers"]
    image: takosumi-local-static-builder:node22
    restart: "no"
    working_dir: /build/docs
    command:
      - sh
      - -c
      - |
        set -eu
        mkdir -p /build/docs
        tar -C /source --exclude=node_modules --exclude=.vitepress/dist -cf - . \
          | tar -C /build/docs -xf -
        npm ci --no-fund --no-audit
        npm run build
        mkdir -p /output
        find /output -mindepth 1 -maxdepth 1 -exec rm -rf {} +
        cp -a .vitepress/dist/. /output/
    volumes:
      - ../../../takosumi/docs:/source:ro
      - ../../../takosumi/docs/.vitepress/dist:/output

  # ---- OpenTelemetry collector + Jaeger (trace + metric sink) ----
  # No service emits OTel today, but the collector + UI are sitting here so
  # the moment instrumentation lands (accounts-service / service)
  # you can verify traces flow end-to-end:
  #   1. service exports OTLP → collector at otel-collector:4317 (gRPC) /
  #      4318 (HTTP)
  #   2. collector forwards to Jaeger at jaeger:4317 (OTLP) / 14250 (jaeger)
  #   3. Jaeger UI at https://jaeger.takosumi.test/ shows the spans
  jaeger:
    profiles: ["postgres", "workers"]
    image: jaegertracing/jaeger:2.4.0
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      takos-local-internal:
        aliases:
          - jaeger

  otel-collector:
    profiles: ["postgres", "workers"]
    image: otel/opentelemetry-collector-contrib:0.118.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "127.0.0.1:14318:4318"
    depends_on:
      jaeger:
        condition: service_started
    volumes:
      - ./otel/config.yaml:/etc/otelcol/config.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      takos-local-internal:
        aliases:
          - otel-collector

  # ---- mailpit SMTP catcher (catches anything any service sends) ----
  # Backends don't send email today, but the infra is here so that the
  # moment they start (signup confirmation, billing alerts, invite mail)
  # the smoke can assert the bytes arrived. Web UI at
  # https://mailpit.takosumi.test/, SMTP at mailpit:1025 (in-network).
  mailpit:
    profiles: ["postgres", "workers"]
    image: axllent/mailpit:latest
    restart: unless-stopped
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
    networks:
      takos-local-internal:
        aliases:
          - mailpit

  # ---- generic local OIDC mock ----
  # Auto-approves /authorize and returns deterministic /userinfo so the
  # cloud sign-in flow completes through a generic OIDC descriptor without external network.
  # Reachable from browser + worker via Caddy at oauth-mock.test.
  oauth-mock:
    profiles: ["postgres", "workers"]
    image: oven/bun:1
    restart: unless-stopped
    command: ["bun", "/srv/main.ts"]
    volumes:
      - ./oauth-mock/main.ts:/srv/main.ts:ro
    networks:
      takos-local-internal:
        aliases:
          - oauth-mock

  # ---- takosumi dashboard SPA (mirrors app.takosumi.com root + /docs) ----
  takosumi-dashboard-build:
    profiles: ["postgres", "workers"]
    image: oven/bun:1
    restart: "no"
    working_dir: /build/dashboard
    command:
      - sh
      - -c
      - |
        set -eu
        mkdir -p /build
        tar -C /source \
          --exclude=.git \
          --exclude=node_modules \
          --exclude='*/node_modules' \
          --exclude=dashboard/dist \
          --exclude=docs/.vitepress/dist \
          --exclude=app-docs/.vitepress/dist \
          --exclude=website/.output \
          -cf - . | tar -C /build -xf -
        bun install --frozen-lockfile
        bun run build
        find /output -mindepth 1 -maxdepth 1 -exec rm -rf {} +
        cp -a dist/. /output/
    volumes:
      - ../../../takosumi:/source:ro
      - ../../../takosumi/dashboard/dist:/output

  # Build hosted Cloud docs only after the dashboard artifact exists. The
  # source tree stays read-only; only the two declared build outputs cross the
  # container boundary.
  takosumi-app-docs-build:
    profiles: ["postgres", "workers"]
    image: takosumi-local-static-builder:node22
    build:
      context: .
      dockerfile_inline: |
        FROM node:22-slim
        RUN apt-get update \
          && apt-get install -y --no-install-recommends git ca-certificates \
          && rm -rf /var/lib/apt/lists/*
    restart: "no"
    depends_on:
      takosumi-dashboard-build:
        condition: service_completed_successfully
    working_dir: /build
    command:
      - sh
      - -c
      - |
        set -eu
        tar -C /source \
          --exclude=.git \
          --exclude=node_modules \
          --exclude='*/node_modules' \
          --exclude=docs/.vitepress/dist \
          --exclude=app-docs/.vitepress/dist \
          --exclude=website/.output \
          -cf - . | tar -C /build -xf -
        cd /build/docs
        npm ci --no-fund --no-audit
        cd /build
        bash scripts/build-app-docs.sh
        find /dashboard-output -mindepth 1 -maxdepth 1 -exec rm -rf {} +
        cp -a dashboard/dist/. /dashboard-output/
        find /app-docs-output -mindepth 1 -maxdepth 1 -exec rm -rf {} +
        cp -a app-docs/.vitepress/dist/. /app-docs-output/
    volumes:
      - ../../../takosumi:/source:ro
      - ../../../takosumi/dashboard/dist:/dashboard-output
      - ../../../takosumi/app-docs/.vitepress/dist:/app-docs-output

  # ---- Phase 3 route registrar ----
  # Maintains the dynamic route partition in Caddy admin. The v1 public
  # deploy control surface does not expose deployment route listings, so dynamic
  # app routes are deferred until an operator-internal projection source lands.
  route-registrar:
    profiles: ["postgres"]
    image: oven/bun:1
    restart: unless-stopped
    depends_on:
      cloud:
        condition: service_healthy
    working_dir: /app
    command: ["bun", "mod.ts"]
    environment:
      SERVICE_URL: http://cloud:8787
      CADDY_ADMIN_URL: http://caddy:2019
      POLL_INTERVAL_MS: "5000"
      GATEWAY_ROUTE_PROJECTION_FILE: /local-substrate-runtime/gateway-routes.json
    volumes:
      - ./route-registrar:/app:ro
      - ./caddy/runtime:/local-substrate-runtime:ro
    networks:
      - takos-local-internal

  route-registrar-workers:
    profiles: ["workers"]
    image: oven/bun:1
    restart: unless-stopped
    depends_on:
      takosumi-service-worker:
        condition: service_healthy
    working_dir: /app
    command: ["bun", "mod.ts"]
    environment:
      SERVICE_URL: http://takosumi-service-worker:8788
      CADDY_ADMIN_URL: http://caddy:2019
      POLL_INTERVAL_MS: "5000"
      GATEWAY_ROUTE_PROJECTION_FILE: /local-substrate-runtime/gateway-routes.json
    volumes:
      - ./route-registrar:/app:ro
      - ./caddy/runtime:/local-substrate-runtime:ro
    networks:
      - takos-local-internal

volumes:
  substrate-postgres-data:
  substrate-redis-data:
  substrate-minio-data:
  takosumi-service-worker-data:

networks:
  takos-local-internal:
    external: true
    name: local-substrate_takos-local-internal
