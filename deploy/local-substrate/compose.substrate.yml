# Phase 1 — Takos product full stack on top of Phase 0 ingress.
#
# Profiles:
#   postgres   takosumi kernel (Deno + Postgres + MinIO) + Accounts + takos product
#   workers    takosumi kernel (workerd / miniflare + D1 + R2) + 同上
#
# Source mount + deno task pattern を採用 (image build 不要)。 production image
# でないのは「test bed」 のために意図的。 ファイル変更が即反映される。

services:
  # ---- 共通 storage / queue ----
  substrate-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: takos
      POSTGRES_PASSWORD: takos
      POSTGRES_DB: takos_app
    volumes:
      - substrate-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U takos -d takos_app"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      takos-local-internal:
        aliases:
          - postgres

  substrate-postgres-init:
    image: postgres:16-alpine
    restart: "no"
    depends_on:
      substrate-postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: takos
    entrypoint:
      - /bin/sh
      - -c
      - |
          for db in takosumi takosumi_accounts takos_git; do
            psql -h postgres -U takos -d takos_app -tc "SELECT 1 FROM pg_database WHERE datname='$$db'" \
              | grep -q 1 \
              || psql -h postgres -U takos -d takos_app -c "CREATE DATABASE $$db"
          done
    networks:
      - takos-local-internal

  substrate-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - substrate-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      takos-local-internal:
        aliases:
          - redis

  substrate-minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-takos}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-takos-minio-pw}
    volumes:
      - substrate-minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "test -f /data/.minio.sys/format.json"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      takos-local-internal:
        aliases:
          - minio

  substrate-minio-init:
    image: minio/mc:latest
    depends_on:
      substrate-minio:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - |
          until mc alias set takos http://minio:9000 \
            "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do sleep 1; done
          mc mb --ignore-existing takos/takosumi
          mc mb --ignore-existing takos/takos-app
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-takos}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-takos-minio-pw}
    networks:
      - takos-local-internal

  # ---- Takosumi Accounts (OIDC issuer) ----

  accounts:
    image: denoland/deno:2.7.10
    restart: unless-stopped
    depends_on:
      substrate-postgres-init:
        condition: service_completed_successfully
    working_dir: /workspace/deploy/node-postgres
    command:
      - deno
      - run
      - -A
      - src/server.ts
    env_file:
      - env/accounts.env
    volumes:
      - ../../../takosumi-cloud:/workspace
    healthcheck:
      test:
        - CMD
        - deno
        - eval
        - "const r = await fetch('http://127.0.0.1:8787/.well-known/openid-configuration'); if(!r.ok) Deno.exit(1)"
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      takos-local-internal:
        aliases:
          - accounts

  # ---- Takosumi kernel (postgres profile) ----

  # kernel embeds runtime-agent in-process when TAKOSUMI_AGENT_URL is unset,
  # so we don't run a separate runtime-agent service for the local-substrate.
  # The image is a thin overlay on denoland/deno that adds docker CLI so
  # the embedded selfhost-docker-compose connector can spawn `docker compose`.
  kernel:
    profiles: ["postgres"]
    build:
      context: .
      dockerfile: wrappers/Dockerfile.kernel
    restart: unless-stopped
    depends_on:
      substrate-postgres-init:
        condition: service_completed_successfully
      substrate-minio-init:
        condition: service_completed_successfully
    working_dir: /workspace
    # Use a wrapper that imports kernel + embedded agent from local source
    # (instead of takosumi-cli server which pins JSR-published kernel).
    command:
      - deno
      - run
      - -A
      - --config
      - /workspace/deno.json
      - /wrappers/kernel-with-embedded-agent.ts
    env_file:
      - env/kernel.env
    volumes:
      - ../../../takosumi:/workspace
      - ./wrappers:/wrappers:ro
      - ./factories:/local-substrate-factories:ro
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test:
        - CMD
        - deno
        - eval
        - "const r = await fetch('http://127.0.0.1:8788/health'); if(!r.ok) Deno.exit(1)"
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s
    networks:
      takos-local-internal:
        aliases:
          - kernel

  # ---- Takosumi kernel (Cloudflare Worker profile) ----
  # Builds and runs takosumi/deploy/cloudflare's Worker-first scaffold under
  # Miniflare with D1/R2 bindings. The postgres profile also starts a mirror
  # at kernel-worker.takos.test so default smoke can verify the Worker code
  # path without replacing the Deno+Postgres kernel used by the Takos product
  # stack.
  takosumi-kernel-worker-build:
    profiles: ["postgres", "workers"]
    image: denoland/deno:2.7.10
    restart: "no"
    working_dir: /work
    command:
      - sh
      - -c
      - |
          mkdir -p deploy/cloudflare/.wrangler/dist
          deno bundle \
            --config deploy/cloudflare/deno.json \
            --platform browser \
            deploy/cloudflare/src/worker.ts \
            -o deploy/cloudflare/.wrangler/dist/takosumi-cloudflare-worker.mjs
    volumes:
      - ../../../takosumi:/work

  takosumi-kernel-worker:
    profiles: ["postgres"]
    build:
      context: .
      dockerfile: wrappers/Dockerfile.takosumi-cloud-worker
    restart: unless-stopped
    depends_on:
      takosumi-kernel-worker-build:
        condition: service_completed_successfully
    working_dir: /app
    command: ["node", "/app/runner.mjs"]
    env_file:
      - ./env/takosumi-kernel-worker.env
    volumes:
      - ../../../takosumi/deploy/cloudflare/.wrangler/dist:/worker:ro
      - ./wrappers/takosumi-kernel-worker-runner.mjs:/app/runner.mjs:ro
      - takosumi-kernel-worker-data:/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:8788/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      takos-local-internal:
        aliases:
          - takosumi-kernel-worker

  kernel-workers:
    profiles: ["workers"]
    build:
      context: .
      dockerfile: wrappers/Dockerfile.takosumi-cloud-worker
    restart: unless-stopped
    depends_on:
      takosumi-kernel-worker-build:
        condition: service_completed_successfully
    working_dir: /app
    command: ["node", "/app/runner.mjs"]
    env_file:
      - ./env/takosumi-kernel-worker.env
    volumes:
      - ../../../takosumi/deploy/cloudflare/.wrangler/dist:/worker:ro
      - ./wrappers/takosumi-kernel-worker-runner.mjs:/app/runner.mjs:ro
      - takosumi-kernel-workers-data:/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:8788/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      takos-local-internal:
        aliases:
          - kernel
          - kernel-workers

  # ---- Takos product ----

  # takos-app uses the local-platform package (Postgres + Redis + libsql)
  # instead of the apps/api Deno entry which expects D1 bindings.
  # Entry: takos/app/apps/control/deno.json → dev:local:web →
  #   packages/control/local-platform/src/web.ts
  takos-app:
    image: denoland/deno:2.7.10
    restart: unless-stopped
    depends_on:
      substrate-postgres-init:
        condition: service_completed_successfully
      substrate-redis:
        condition: service_healthy
      accounts:
        condition: service_healthy
    working_dir: /workspace/apps/control
    command: ["deno", "task", "dev:local:web"]
    env_file:
      - env/takos-app.env
    volumes:
      # Test bed lives in takosumi/deploy/local-substrate, so takos source
      # paths go up 3 levels and into the sibling takos submodule.
      - ../../../takos/app:/workspace
      - ../../../takos/git:/git:ro
      - takos-app-data:/var/lib/takos-local-substrate
    healthcheck:
      test:
        - CMD
        - deno
        - eval
        - "const r = await fetch('http://127.0.0.1:8787/health'); if(!r.ok) Deno.exit(1)"
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    networks:
      takos-local-internal:
        aliases:
          - takos-app

  takos-git:
    image: denoland/deno:2.7.10
    restart: unless-stopped
    depends_on:
      substrate-postgres-init:
        condition: service_completed_successfully
    working_dir: /workspace
    command: ["deno", "task", "dev"]
    environment:
      PORT: "8790"
      TAKOS_GIT_INTERNAL_URL: http://takos-git:8790
      TAKOS_INTERNAL_SERVICE_SECRET: ${TAKOS_INTERNAL_SERVICE_SECRET:-local-dev-secret}
      TAKOS_GIT_REPOSITORY_ROOT: /var/lib/takos-git/repositories
      TAKOS_GIT_DATABASE_URL: sqlite:///var/lib/takos-git/repositories/.takos/git.sqlite
      GIT_CONFIG_COUNT: "1"
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: "*"
    volumes:
      # Test bed lives in takosumi/deploy/local-substrate; takos-git source
      # is the sibling takos submodule, so 3 levels up + takos/git.
      - ../../../takos/git:/workspace
      - takos-git-node-modules:/workspace/node_modules
      - takos-git-repos:/var/lib/takos-git/repositories
    networks:
      takos-local-internal:
        aliases:
          - takos-git

  # ---- takosumi landing (SolidStart, mirrors takosumi.com root) ----
  takosumi-website-build:
    profiles: ["postgres"]
    image: node:22-slim
    restart: "no"
    working_dir: /website
    command:
      - sh
      - -c
      - |
          if [ ! -d node_modules ]; then
            npm install --no-fund --no-audit
          fi
          npm run build
    volumes:
      - ../../../takosumi/website:/website

  # ---- takosumi docs (VitePress, mirrors takosumi.com/docs/) ----
  takosumi-docs-build:
    profiles: ["postgres"]
    # Debian-based (not alpine) — vitepress / rollup pull glibc-flavored
    # native binaries; alpine + musl breaks the install.
    image: node:22-slim
    restart: "no"
    working_dir: /docs
    command:
      - sh
      - -c
      - |
          # vitepress needs git for lastUpdated metadata, and may need
          # rebuilt native modules if the host's node_modules were from a
          # different libc.
          apt-get update -qq && apt-get install -y --no-install-recommends git ca-certificates >/dev/null
          if [ -f node_modules/rollup/dist/native.js ] && \
             ! ldd node_modules/rollup/dist/native.js >/dev/null 2>&1; then
            rm -rf node_modules
          fi
          if [ ! -d node_modules ]; then
            npm install --no-fund --no-audit
          fi
          npm run build
    volumes:
      - ../../../takosumi/docs:/docs

  # ---- takos landing (SolidStart, mirrors takos.jp root) ----
  takos-website-build:
    profiles: ["postgres"]
    image: node:22-slim
    restart: "no"
    working_dir: /website
    command:
      - sh
      - -c
      - |
          if [ ! -d node_modules ]; then
            npm install --no-fund --no-audit
          fi
          # Point the cloud-install CTA at the local-substrate cloud mirror
          # instead of cloud.takosumi.com so links work end-to-end in the
          # local test bed.
          export VITE_CLOUD_INSTALL_URL="https://cloud.takosumi.test/apps/install?git=https%3A%2F%2Fgithub.com%2Ftako0614%2Ftakos.git&ref=main&mode=shared-cell&autopreview=1"
          npm run build
    volumes:
      - ../../../takos/website:/website

  # ---- install_preview mock (stands in for takosumi-git's preview API) ----
  # Returns deterministic fake {appId, source.commit, source.*Digest} so the
  # install wizard can complete preview → install end-to-end without a real
  # git mirror behind it.
  install-preview-mock:
    profiles: ["postgres", "workers"]
    image: denoland/deno:alpine-2.1.4
    restart: unless-stopped
    command: [
      "run",
      "--allow-net",
      "--allow-env=PORT",
      "--allow-read=/srv",
      "/srv/main.ts",
    ]
    volumes:
      - ./install-preview-mock/main.ts:/srv/main.ts:ro
      - ./install-preview-mock/fixtures:/srv/fixtures:ro
    networks:
      takos-local-internal:
        aliases:
          - install-preview-mock

  # ---- OpenTelemetry collector + Jaeger (trace + metric sink) ----
  # No service emits OTel today, but the collector + UI are sitting here so
  # the moment instrumentation lands (accounts-service / kernel / takos-app)
  # you can verify traces flow end-to-end:
  #   1. service exports OTLP → collector at otel-collector:4317 (gRPC) /
  #      4318 (HTTP)
  #   2. collector forwards to Jaeger at jaeger:4317 (OTLP) / 14250 (jaeger)
  #   3. Jaeger UI at https://jaeger.takos.test/ shows the spans
  jaeger:
    profiles: ["postgres"]
    image: jaegertracing/jaeger:2.4.0
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      takos-local-internal:
        aliases:
          - jaeger

  otel-collector:
    profiles: ["postgres"]
    image: otel/opentelemetry-collector-contrib:0.118.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    depends_on:
      jaeger:
        condition: service_started
    volumes:
      - ./otel/config.yaml:/etc/otelcol/config.yaml:ro
    networks:
      takos-local-internal:
        aliases:
          - otel-collector

  # ---- mailpit SMTP catcher (catches anything any service sends) ----
  # Backends don't send email today, but the infra is here so that the
  # moment they start (signup confirmation, billing alerts, invite mail)
  # the smoke can assert the bytes arrived. Web UI at
  # https://mailpit.takos.test/, SMTP at mailpit:1025 (in-network).
  mailpit:
    profiles: ["postgres"]
    image: axllent/mailpit:latest
    restart: unless-stopped
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
    networks:
      takos-local-internal:
        aliases:
          - mailpit

  # ---- oauth-mock (stands in for accounts.google.com + github.com) ----
  # Auto-approves /authorize and returns deterministic /userinfo so the
  # cloud sign-in flow (Google / GitHub button) completes without external
  # network. Reachable from browser + worker via Caddy at oauth-mock.test.
  oauth-mock:
    profiles: ["postgres", "workers"]
    image: denoland/deno:alpine-2.1.4
    restart: unless-stopped
    command: ["run", "--allow-net", "--allow-env=PORT", "/srv/main.ts"]
    volumes:
      - ./oauth-mock/main.ts:/srv/main.ts:ro
    networks:
      takos-local-internal:
        aliases:
          - oauth-mock

  # ---- yurucommu backend instances (federation smoke) ----
  # Two isolated instances on inst-a.takos.test / inst-b.takos.test so
  # scripts/federation-smoke.sh can verify cross-instance ActivityPub
  # discovery and scripts/federation-follow.sh can exercise the strict
  # Follow → Accept path through yurucommu's Deno local delivery queue.
  yurucommu-a:
    profiles: ["postgres"]
    image: denoland/deno:debian-2.7.10
    restart: unless-stopped
    working_dir: /workspace
    command:
      - sh
      - -c
      - |
          if ! command -v sqlite3 >/dev/null 2>&1; then
            apt-get update -qq && apt-get install -y -qq libsqlite3-dev sqlite3 >/dev/null
          fi
          # deno x/sqlite3 dlopen's libsqlite3.so directly (not .so.0).
          ln -sf libsqlite3.so.0 /usr/lib/x86_64-linux-gnu/libsqlite3.so 2>/dev/null || true
          mkdir -p /data/storage
          deno run -A npm:drizzle-kit push --force >/dev/null 2>&1 || true
          # --allow-ffi is required for deno.land/x/sqlite3 (the dev:deno task
          # in deno.json doesn't include it; pass directly here).
          exec deno run --allow-net --allow-read --allow-write --allow-env --allow-ffi --allow-sys --allow-run src/backend/server.ts
    env_file:
      - env/yurucommu-a.env
    volumes:
      - ../../../yurucommu:/workspace
      - yurucommu-a-data:/data
      - yurucommu-deno-cache:/deno-dir
      # Mount Pebble issuance root so Deno fetch() can validate the
      # peer instance's HTTPS cert during federation (cross-fetch of
      # actor JSON before queuing the Follow delivery).
      - ./caddy/runtime/pebble-issuance-root.pem:/etc/ssl/pebble-root.pem:ro
    networks:
      takos-local-internal:
        aliases:
          - yurucommu-a
          - inst-a.takos.test

  yurucommu-b:
    profiles: ["postgres"]
    image: denoland/deno:debian-2.7.10
    restart: unless-stopped
    working_dir: /workspace
    command:
      - sh
      - -c
      - |
          if ! command -v sqlite3 >/dev/null 2>&1; then
            apt-get update -qq && apt-get install -y -qq libsqlite3-dev sqlite3 >/dev/null
          fi
          # deno x/sqlite3 dlopen's libsqlite3.so directly (not .so.0).
          ln -sf libsqlite3.so.0 /usr/lib/x86_64-linux-gnu/libsqlite3.so 2>/dev/null || true
          mkdir -p /data/storage
          deno run -A npm:drizzle-kit push --force >/dev/null 2>&1 || true
          # --allow-ffi is required for deno.land/x/sqlite3 (the dev:deno task
          # in deno.json doesn't include it; pass directly here).
          exec deno run --allow-net --allow-read --allow-write --allow-env --allow-ffi --allow-sys --allow-run src/backend/server.ts
    env_file:
      - env/yurucommu-b.env
    volumes:
      - ../../../yurucommu:/workspace
      - yurucommu-b-data:/data
      - yurucommu-deno-cache:/deno-dir
      # Pebble root for cross-instance federation HTTPS (see yurucommu-a).
      - ./caddy/runtime/pebble-issuance-root.pem:/etc/ssl/pebble-root.pem:ro
    networks:
      takos-local-internal:
        aliases:
          - yurucommu-b
          - inst-b.takos.test

  # ---- yurucommu landing (plain HTML, mirrors yurucommu.com root) ----
  # No build step; site/ ships as static files. This service exists so
  # `docker compose up` shows yurucommu in the topology summary even
  # though no work runs.
  yurucommu-site-noop:
    profiles: ["postgres"]
    image: alpine:3.20
    restart: "no"
    command: ["sh", "-c", "echo 'yurucommu site is static — no build needed'"]
    volumes:
      - ../../../yurucommu/site:/site:ro

  # ---- takosumi-cloud dashboard SPA (mirrors cloud.takosumi.com root) ----
  takosumi-cloud-dashboard-build:
    profiles: ["postgres", "workers"]
    image: node:22-slim
    restart: "no"
    working_dir: /dashboard
    command:
      - sh
      - -c
      - |
          if [ ! -d node_modules ]; then
            npm install --no-fund --no-audit
          fi
          export VITE_TAKOSUMI_DASHBOARD_DEV_SIGN_IN="true"
          npm run build
    volumes:
      - ../../../takosumi-cloud/packages/dashboard-ui:/dashboard

  # ---- takosumi-cloud Worker (mirrors cloud.takosumi.com on Cloudflare Workers) ----
  takosumi-cloud-worker-build:
    profiles: ["postgres", "workers"]
    image: denoland/deno:2.7.10
    restart: "no"
    working_dir: /work
    command:
      - sh
      - -c
      - |
          mkdir -p deploy/cloudflare/.wrangler/dist
          deno bundle \
            --config deploy/cloudflare/deno.json \
            --platform browser \
            deploy/cloudflare/src/worker.ts \
            -o deploy/cloudflare/.wrangler/dist/takosumi-cloud-accounts-worker.mjs
    volumes:
      - ../../../takosumi-cloud:/work

  takosumi-cloud-worker:
    profiles: ["postgres", "workers"]
    build:
      context: .
      dockerfile: wrappers/Dockerfile.takosumi-cloud-worker
    restart: unless-stopped
    depends_on:
      takosumi-cloud-worker-build:
        condition: service_completed_successfully
      install-preview-mock:
        condition: service_started
      oauth-mock:
        condition: service_started
    working_dir: /app
    command: ["node", "/app/runner.mjs"]
    # All ~30 env vars live in env/takosumi-cloud-worker.env so the compose
    # service block stays readable. Inline-only deltas would go here.
    env_file:
      - ./env/takosumi-cloud-worker.env
    volumes:
      - ../../../takosumi-cloud/deploy/cloudflare/.wrangler/dist:/worker:ro
      - ./wrappers/takosumi-cloud-worker-runner.mjs:/app/runner.mjs:ro
      - takosumi-cloud-worker-data:/data
    networks:
      takos-local-internal:
        aliases:
          - takosumi-cloud-worker

  # ---- Phase 3 route registrar ----
  # Polls kernel for applied deployments and mirrors their routes into
  # Caddy admin API as dynamic reverse_proxy entries.
  route-registrar:
    profiles: ["postgres"]
    image: denoland/deno:2.7.10
    restart: unless-stopped
    depends_on:
      kernel:
        condition: service_healthy
    working_dir: /app
    command: ["deno", "task", "start"]
    environment:
      KERNEL_URL: http://kernel:8788
      CADDY_ADMIN_URL: http://caddy:2019
      KERNEL_DEPLOY_TOKEN: ${TAKOSUMI_DEPLOY_TOKEN:-local-substrate-deploy-token}
      POLL_INTERVAL_MS: "5000"
    volumes:
      - ./route-registrar:/app:ro
    networks:
      - takos-local-internal

  route-registrar-workers:
    profiles: ["workers"]
    image: denoland/deno:2.7.10
    restart: unless-stopped
    depends_on:
      kernel-workers:
        condition: service_healthy
    working_dir: /app
    command: ["deno", "task", "start"]
    environment:
      KERNEL_URL: http://kernel-workers:8788
