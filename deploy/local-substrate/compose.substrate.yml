# Phase 1 — Takosumi integration test bed on top of Phase 0 ingress.
#
# Scope: Takosumi 製品群のみ (kernel + Accounts + cloud worker +
# dashboard SPA + takosumi-worker)。 Takos product (takos-app /
# takos-git) と yurucommu の direct service は外してある。 各 product
# の動作確認は各 repo 内の test に委ねる。 「Takosumi 経由で
# yurucommu を install して動かす」 統合シナリオは TODO-SMOKE.md
# 筆頭参照。
#
# Profiles:
#   postgres   Takosumi kernel (Bun + Postgres + MinIO) + Accounts
#              + cloud worker + kernel worker (Miniflare mirror)
#   workers    Takosumi kernel (workerd / Miniflare + D1 + R2) + 同上
#
# Source mount + Bun command pattern を採用 (image build 不要)。 production
# image でないのは「test bed」 のために意図的。 ファイル変更が即反映される。

services:
  # ---- 共通 storage / queue ----
  substrate-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: takos
      POSTGRES_PASSWORD: takos
      POSTGRES_DB: takos_app
    volumes:
      - substrate-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U takos -d takos_app"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      takos-local-internal:
        aliases:
          - postgres

  substrate-postgres-init:
    image: postgres:16-alpine
    restart: "no"
    depends_on:
      substrate-postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: takos
    entrypoint:
      - /bin/sh
      - -c
      - |
          for db in takosumi takosumi_accounts; do
            psql -h postgres -U takos -d takos_app -tc "SELECT 1 FROM pg_database WHERE datname='$$db'" \
              | grep -q 1 \
              || psql -h postgres -U takos -d takos_app -c "CREATE DATABASE $$db"
          done
    networks:
      - takos-local-internal

  substrate-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - substrate-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      takos-local-internal:
        aliases:
          - redis

  substrate-minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-takos}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-takos-minio-pw}
    volumes:
      - substrate-minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "test -f /data/.minio.sys/format.json"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      takos-local-internal:
        aliases:
          - minio

  substrate-minio-init:
    image: minio/mc:latest
    depends_on:
      substrate-minio:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - |
          until mc alias set takos http://minio:9000 \
            "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do sleep 1; done
          mc mb --ignore-existing takos/takosumi
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-takos}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-takos-minio-pw}
    networks:
      - takos-local-internal

  # ---- Takosumi Accounts (OIDC issuer) ----

  cloud-migrate:
    image: oven/bun:1
    restart: "no"
    depends_on:
      substrate-postgres-init:
        condition: service_completed_successfully
    working_dir: /workspace
    command:
      - sh
      - -c
      - |
          bun packages/cli/src/main.ts accounts migrate \
            --database-url "$$TAKOSUMI_ACCOUNTS_DATABASE_URL"
    env_file:
      - env/cloud.env
    volumes:
      - ../../../takosumi:/workspace
    networks:
      - takos-local-internal

  # ---- Takosumi runtime-agent (execution plane, postgres profile) ----
  #
  # The `cloud` control plane dispatches source / lifecycle / capability
  # execution here over TAKOSUMI_AGENT_URL. This is the execution half split out
  # of the old monolithic `kernel` service; it carries docker.sock + subprocess
  # privilege so connectors can spawn `docker compose`. Image is a thin overlay
  # on a Bun base that adds the docker CLI.
  agent:
    profiles: ["postgres"]
    build:
      context: .
      dockerfile: wrappers/Dockerfile.kernel
    restart: unless-stopped
    depends_on:
      substrate-postgres-init:
        condition: service_completed_successfully
      substrate-minio-init:
        condition: service_completed_successfully
    working_dir: /workspace
    command:
      - bun
      - /wrappers/agent.ts
    env_file:
      - env/agent.env
    volumes:
      - ../../../takosumi:/workspace
      - ../../../takosumi-plugins:/plugins
      - ../../../takos:/sources/takos:ro
      - ./wrappers:/wrappers:ro
      - ./factories:/local-substrate-factories:ro
      - ./caddy/runtime:/local-substrate-runtime
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - "const r = await fetch('http://127.0.0.1:8789/v1/health'); if(!r.ok) throw new Error('agent unhealthy')"
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s
    networks:
      takos-local-internal:
        aliases:
          - agent

  # ---- Takosumi cloud control plane (postgres profile) ----
  #
  # The ONE composed app this profile serves at accounts.takosumi.test: account
  # plane (OIDC issuer, billing, dashboard, install UI) + the embedded Takosumi
  # kernel (wrappers/cloud.ts -> buildComposedServer). Mirrors production's one
  # accounts.takosumi.com; replaces the old separate accounts + kernel services.
  # Holds NO docker.sock — execution is dispatched to `agent`. Imports straddle
  # /workspace (takosumi), /takosumi (the dev-seam @takosjp/takosumi
  # target), and /plugins (native kinds), run under the takosumi config.
  cloud:
    profiles: ["postgres"]
    image: oven/bun:1
    restart: unless-stopped
    depends_on:
      cloud-migrate:
        condition: service_completed_successfully
      agent:
        condition: service_healthy
    working_dir: /workspace
    command:
      - bun
      - /wrappers/cloud.ts
    env_file:
      - env/cloud.env
    volumes:
      - ../../../takosumi:/workspace
      - ../../../takosumi:/takosumi:ro
      - ../../../takosumi-plugins:/plugins:ro
      - ./wrappers:/wrappers:ro
      - ./factories:/local-substrate-factories:ro
      - ./caddy/runtime:/local-substrate-runtime
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - "const r = await fetch('http://127.0.0.1:8787/.well-known/openid-configuration'); if(!r.ok) throw new Error('cloud unhealthy')"
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s
    networks:
      takos-local-internal:
        aliases:
          - cloud

  # ---- Takosumi kernel (Cloudflare Worker profile) ----
  # Builds and runs takosumi/deploy/cloudflare's Worker-first scaffold under
  # Miniflare with D1/R2 bindings. The postgres profile also starts a mirror
  # at kernel-worker.takosumi.test so default smoke can verify the Worker code
  # path without replacing the Bun+Postgres kernel used by the Takos product
  # stack.
  takosumi-kernel-worker-build:
    profiles: ["postgres", "workers"]
    image: oven/bun:1
    restart: "no"
    working_dir: /work
    command:
      - sh
      - -c
      - |
          mkdir -p deploy/cloudflare/.wrangler/dist
          bun build \
            --target browser \
            deploy/cloudflare/src/worker.ts \
            --outfile deploy/cloudflare/.wrangler/dist/takosumiflare-worker.mjs
    volumes:
      - ../../../takosumi:/work

  takosumi-kernel-worker:
    profiles: ["postgres"]
    build:
      context: .
      dockerfile: wrappers/Dockerfile.takosumi-worker
    restart: unless-stopped
    depends_on:
      takosumi-kernel-worker-build:
        condition: service_completed_successfully
    working_dir: /app
    command: ["node", "/app/runner.mjs"]
    env_file:
      - ./env/takosumi-kernel-worker.env
    volumes:
      - ../../../takosumi/deploy/cloudflare/.wrangler/dist:/worker:ro
      - ./wrappers/takosumi-kernel-worker-runner.mjs:/app/runner.mjs:ro
      - takosumi-kernel-worker-data:/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:8788/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      takos-local-internal:
        aliases:
          - takosumi-kernel-worker

  kernel-workers:
    profiles: ["workers"]
    build:
      context: .
      dockerfile: wrappers/Dockerfile.takosumi-worker
    restart: unless-stopped
    depends_on:
      takosumi-kernel-worker-build:
        condition: service_completed_successfully
    working_dir: /app
    command: ["node", "/app/runner.mjs"]
    env_file:
      - ./env/takosumi-kernel-worker.env
    volumes:
      - ../../../takosumi/deploy/cloudflare/.wrangler/dist:/worker:ro
      - ./wrappers/takosumi-kernel-worker-runner.mjs:/app/runner.mjs:ro
      - takosumi-kernel-workers-data:/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:8788/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      takos-local-internal:
        aliases:
          - kernel
          - kernel-workers

  # ---- takosumi landing (SolidStart, mirrors takosumi.com root) ----
  takosumi-website-build:
    profiles: ["postgres"]
    image: node:22-slim
    restart: "no"
    working_dir: /website
    command:
      - sh
      - -c
      - |
          if [ ! -d node_modules ]; then
            npm install --no-fund --no-audit
          fi
          npm run build
    volumes:
      - ../../../takosumi/website:/website

  # ---- takosumi docs (VitePress, mirrors takosumi.com/docs/) ----
  takosumi-docs-build:
    profiles: ["postgres"]
    # Debian-based (not alpine) — vitepress / rollup pull glibc-flavored
    # native binaries; alpine + musl breaks the install.
    image: node:22-slim
    restart: "no"
    working_dir: /docs
    command:
      - sh
      - -c
      - |
          # vitepress needs git for lastUpdated metadata, and may need
          # rebuilt native modules if the host's node_modules were from a
          # different libc.
          apt-get update -qq && apt-get install -y --no-install-recommends git ca-certificates >/dev/null
          if [ -f node_modules/rollup/dist/native.js ] && \
             ! ldd node_modules/rollup/dist/native.js >/dev/null 2>&1; then
            rm -rf node_modules
          fi
          if [ ! -d node_modules ]; then
            npm install --no-fund --no-audit
          fi
          npm run build
    volumes:
      - ../../../takosumi/docs:/docs

  # ---- installer mock (local Accounts installer fixture API) ----
  # Returns deterministic fake {appId, source.commit, source.*Digest} so the
  # install wizard can complete dry-run → install end-to-end without a real
  # git mirror behind it.
  installer-mock:
    profiles: ["postgres", "workers"]
    image: oven/bun:1
    restart: unless-stopped
    command: ["bun", "/srv/main.ts"]
    volumes:
      - ./installer-mock/main.ts:/srv/main.ts:ro
      - ./installer-mock/fixtures:/srv/fixtures:ro
    networks:
      takos-local-internal:
        aliases:
          - installer-mock

  # ---- OpenTelemetry collector + Jaeger (trace + metric sink) ----
  # No service emits OTel today, but the collector + UI are sitting here so
  # the moment instrumentation lands (accounts-service / kernel)
  # you can verify traces flow end-to-end:
  #   1. service exports OTLP → collector at otel-collector:4317 (gRPC) /
  #      4318 (HTTP)
  #   2. collector forwards to Jaeger at jaeger:4317 (OTLP) / 14250 (jaeger)
  #   3. Jaeger UI at https://jaeger.takosumi.test/ shows the spans
  jaeger:
    profiles: ["postgres"]
    image: jaegertracing/jaeger:2.4.0
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      takos-local-internal:
        aliases:
          - jaeger

  otel-collector:
    profiles: ["postgres"]
    image: otel/opentelemetry-collector-contrib:0.118.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    depends_on:
      jaeger:
        condition: service_started
    volumes:
      - ./otel/config.yaml:/etc/otelcol/config.yaml:ro
    networks:
      takos-local-internal:
        aliases:
          - otel-collector

  # ---- mailpit SMTP catcher (catches anything any service sends) ----
  # Backends don't send email today, but the infra is here so that the
  # moment they start (signup confirmation, billing alerts, invite mail)
  # the smoke can assert the bytes arrived. Web UI at
  # https://mailpit.takosumi.test/, SMTP at mailpit:1025 (in-network).
  mailpit:
    profiles: ["postgres"]
    image: axllent/mailpit:latest
    restart: unless-stopped
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
    networks:
      takos-local-internal:
        aliases:
          - mailpit

  # ---- oauth-mock (stands in for accounts.google.com + github.com) ----
  # Auto-approves /authorize and returns deterministic /userinfo so the
  # cloud sign-in flow (Google / GitHub button) completes without external
  # network. Reachable from browser + worker via Caddy at oauth-mock.test.
  oauth-mock:
    profiles: ["postgres", "workers"]
    image: oven/bun:1
    restart: unless-stopped
    command: ["bun", "/srv/main.ts"]
    volumes:
      - ./oauth-mock/main.ts:/srv/main.ts:ro
    networks:
      takos-local-internal:
        aliases:
          - oauth-mock

  # ---- takosumi dashboard SPA (mirrors accounts.takosumi.com root) ----
  takosumi-dashboard-build:
    profiles: ["postgres", "workers"]
    image: node:22-slim
    restart: "no"
    working_dir: /dashboard
    command:
      - sh
      - -c
      - |
          if [ ! -d node_modules ]; then
            npm install --no-fund --no-audit
          fi
          export VITE_TAKOSUMI_DASHBOARD_DEV_SIGN_IN="true"
          export VITE_TAKOSUMI_DASHBOARD_DEV_SUBJECT="tsub_takosumi_cloud_local"
          export VITE_TAKOSUMI_DASHBOARD_DEV_SESSION_ID="sess_local_substrate"
          export VITE_TAKOSUMI_DASHBOARD_DEV_ACCOUNT_ID="acct_local"
          export VITE_TAKOSUMI_DASHBOARD_DEV_SPACE_ID="space_local"
          npm run build
    volumes:
      - ../../../takosumi/packages/dashboard-ui:/dashboard

  # ---- takosumi Worker (mirrors accounts.takosumi.com on Cloudflare Workers) ----
  takosumi-worker-build:
    profiles: ["postgres", "workers"]
    image: oven/bun:1
    restart: "no"
    working_dir: /work
    command:
      - sh
      - -c
      - |
          mkdir -p deploy/cloudflare/.wrangler/dist
          bun build \
            --target browser \
            deploy/cloudflare/src/worker.ts \
            --outfile deploy/cloudflare/.wrangler/dist/takosumi-accounts-worker.mjs
    volumes:
      - ../../../takosumi:/work

  takosumi-worker:
    profiles: ["postgres", "workers"]
    build:
      context: .
      dockerfile: wrappers/Dockerfile.takosumi-worker
    restart: unless-stopped
    depends_on:
      takosumi-worker-build:
        condition: service_completed_successfully
      installer-mock:
        condition: service_started
      oauth-mock:
        condition: service_started
    working_dir: /app
    command: ["node", "/app/runner.mjs"]
    # All ~30 env vars live in env/takosumi-worker.env so the compose
    # service block stays readable. Inline-only deltas would go here.
    env_file:
      - ./env/takosumi-worker.env
    volumes:
      - ../../../takosumi/deploy/cloudflare/.wrangler/dist:/worker:ro
      - ./wrappers/takosumi-worker-runner.mjs:/app/runner.mjs:ro
      - takosumi-worker-data:/data
    networks:
      takos-local-internal:
        aliases:
          - takosumi-worker

  # ---- Phase 3 route registrar ----
  # Maintains the dynamic route partition in Caddy admin. The v1 public
  # installer surface does not expose deployment route listings, so dynamic
  # app routes are deferred until an operator-internal projection source lands.
  route-registrar:
    profiles: ["postgres"]
    image: oven/bun:1
    restart: unless-stopped
    depends_on:
      cloud:
        condition: service_healthy
    working_dir: /app
    command: ["bun", "mod.ts"]
    environment:
      KERNEL_URL: http://cloud:8787
      CADDY_ADMIN_URL: http://caddy:2019
      POLL_INTERVAL_MS: "5000"
      GATEWAY_ROUTE_PROJECTION_FILE: /local-substrate-runtime/gateway-routes.json
    volumes:
      - ./route-registrar:/app:ro
      - ./caddy/runtime:/local-substrate-runtime:ro
    networks:
      - takos-local-internal

  route-registrar-workers:
    profiles: ["workers"]
    image: oven/bun:1
    restart: unless-stopped
    depends_on:
      kernel-workers:
        condition: service_healthy
    working_dir: /app
    command: ["bun", "mod.ts"]
    environment:
      KERNEL_URL: http://kernel-workers:8788
      CADDY_ADMIN_URL: http://caddy:2019
      POLL_INTERVAL_MS: "5000"
      GATEWAY_ROUTE_PROJECTION_FILE: /local-substrate-runtime/gateway-routes.json
    volumes:
      - ./route-registrar:/app:ro
      - ./caddy/runtime:/local-substrate-runtime:ro
    networks:
      - takos-local-internal

volumes:
  substrate-postgres-data:
  substrate-redis-data:
  substrate-minio-data:
  takosumi-worker-data:
  takosumi-kernel-worker-data:
  takosumi-kernel-workers-data:

networks:
  takos-local-internal:
    external: true
    name: local-substrate_takos-local-internal
