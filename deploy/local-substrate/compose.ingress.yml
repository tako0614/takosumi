# Phase 0 baseline. Pebble (ACME staging) + CoreDNS (*.takosumi.test) + Caddy
# (Pebble issuer) を host へ無線にせず docker network 内で完結させる。
#
# 検証の golden path:
#   1. scripts/up.sh で起動
#   2. scripts/ca-install.sh で Pebble issuance root を host trust store に追加
#   3. curl https://hello.takosumi.test/ が Pebble-signed cert chain 付きで 200

services:
  pebble:
    image: ghcr.io/letsencrypt/pebble:latest
    restart: unless-stopped
    command:
      - -config
      - /pebble/pebble-config.json
    environment:
      PEBBLE_VA_NOSLEEP: "1"
      PEBBLE_WFE_NONCEREJECT: "0"
    volumes:
      - ./pebble/pebble-config.json:/pebble/pebble-config.json:ro
    ports:
      - "127.0.0.1:15000:15000"
    networks:
      takos-local-internal:
        aliases:
          - pebble

  coredns:
    image: coredns/coredns:latest
    restart: unless-stopped
    command:
      - "-conf"
      - "/etc/coredns/Corefile"
    volumes:
      - ./coredns/Corefile:/etc/coredns/Corefile:ro
      # zones-rendered/ は scripts/dns-zone-render.sh が source coredns/zones/
      # から {{INGRESS_IP}} を render して書き出す generated artifact。
      # default は 127.0.0.1 (= single-machine mode、 backward compat)。
      # LAN mode は TAKOSUMI_LOCAL_SUBSTRATE_INGRESS_IP=<dev-LAN-IP> で起動。
      - ./coredns/zones-rendered:/etc/coredns/zones:ro
    ports:
      # default の host bind は 127.0.0.1 で backward compat。
      # LAN client が dev マシンの CoreDNS を聞くには
      # TAKOSUMI_LOCAL_SUBSTRATE_DNS_HOST_BIND=0.0.0.0 (or <dev-LAN-IP>) で起動。
      # dev マシン側 systemd-resolved が :53 を占有している場合は
      # docs/lan-host.md の DNSStubListener=no 手順を参照。
      - "${TAKOSUMI_LOCAL_SUBSTRATE_DNS_HOST_BIND:-127.0.0.1}:53:53/udp"
      - "${TAKOSUMI_LOCAL_SUBSTRATE_DNS_HOST_BIND:-127.0.0.1}:53:53/tcp"
    networks:
      takos-local-internal:
        aliases:
          - coredns

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      pebble:
        condition: service_started
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/runtime:/runtime:ro
      - ../../../takosumi/website/.output/public:/srv/takosumi-marketing:ro
      - ../../../takosumi/docs/.vitepress/dist:/srv/takosumi-docs:ro
      - ../../../takosumi/packages/dashboard-ui/.output/public:/srv/takosumi-dashboard:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      - "80:80"
      - "443:443"
      # Caddy admin API (2019) is intentionally NOT exposed to the host.
      # route-registrar talks to it over the internal docker network. To
      # poke it from the host ad-hoc, use:
      #   docker exec local-substrate-caddy-1 caddy reload --config /etc/caddy/Caddyfile
      # or `docker compose exec caddy curl -s localhost:2019/config/`.
    # host.docker.internal injection — Wave M-C で ecosystem product の Vite
    # dev server (host で起動、 *.takos.test / yurucommu.test reverse proxy)
    # を Caddy 経由で TLS 終端する際の host-gateway 解決に必要。 Linux Docker
    # では default で host.docker.internal が解決しないので、 明示 inject。
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      takos-local-internal:
        aliases:
          - caddy
          - hello.takosumi.test
          - accounts.takosumi.test
          - kernel.takosumi.test
          - kernel-worker.takosumi.test
          - takosumi.test
          - accounts.takosumi.test
          - takos.app.takosumi.test
          - oauth-mock.test
          - mailpit.takosumi.test
          - jaeger.takosumi.test
          # Ecosystem dev hostnames (Wave M-C → M-F 訂正後)
          # production hostname 構造を正確に mirror (= invented subdomain 削除)
          - takos.test
          - road.takos.test
          - yurucommu.test

networks:
  takos-local-internal:
    driver: bridge

volumes:
  caddy-data:
  caddy-config:
