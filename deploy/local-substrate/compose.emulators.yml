# Phase 2 — Optional cloud emulators.
#
# Default deploy mode is real-cloud (credentials from .env). These emulators
# are opt-in for testing without cloud accounts. Enable with:
#   bash scripts/up.sh --profile postgres --emulators localstack
#   bash scripts/up.sh --profile postgres --emulators localstack,k3d
#
# Picked deliberately: LocalStack covers AWS storage path well, k3d is a
# fully working Kubernetes for free. GCP / Azure / Cloudflare have no
# emulators of comparable quality, so we deliberately don't ship them —
# use real cloud credentials for those.

services:
  localstack:
    profiles: ['localstack']
    image: localstack/localstack:latest
    restart: unless-stopped
    environment:
      SERVICES: s3,sts,iam,rds
      DEFAULT_REGION: ${AWS_REGION:-us-east-1}
      DISABLE_CORS_CHECKS: '1'
    ports:
      - '127.0.0.1:4566:4566'
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:4566/_localstack/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      takos-local-internal:
        aliases:
          - localstack
          - s3.us-east-1.amazonaws.com
          - sts.amazonaws.com

  # k3d brings up a real K3s cluster in Docker. Uses k3d's own bootstrap
  # via a oneshot service that calls k3d cluster create. Cluster API is
  # exposed at https://k3d:6443 inside the network.
  k3d:
    profiles: ['k3d']
    image: rancher/k3s:v1.30.0-k3s1
    restart: unless-stopped
    privileged: true
    command:
      - server
      - --tls-san=k3d
      - --disable=traefik
      - --disable-network-policy
      - --write-kubeconfig=/output/kubeconfig
      - --write-kubeconfig-mode=666
    environment:
      K3S_TOKEN: ${K3S_TOKEN:-local-substrate-k3s-token}
    volumes:
      - k3d-data:/var/lib/rancher/k3s
      - k3d-output:/output
    expose:
      - '6443'
    networks:
      takos-local-internal:
        aliases:
          - k3d

volumes:
  localstack-data:
  k3d-data:
  k3d-output:

networks:
  takos-local-internal:
    external: true
    name: local-substrate_takos-local-internal
