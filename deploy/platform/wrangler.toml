# Takosumi platform worker — operator-neutral REFERENCE TEMPLATE.
#
# The REALIZED config actually deployed by the operator (real resource IDs)
# lives in the operator-private takosumi-private repo (platform/wrangler.toml),
# which references this repo's worker.ts / dashboard / runner Dockerfile by
# relative path. This template documents the full binding shape with
# placeholder IDs; keep the two in sync.
#
# One worker = accounts plane (bare-origin OIDC issuer) + in-process
# deploy-control plane + dashboard SPA (served from ASSETS) + OpenTofu runner
# container. The Takos product is never officially deployed here; users deploy
# Takos onto their own infra via Takosumi.
#
# All relative paths below resolve from THIS config's directory
# (takosumi/deploy/platform/).

name = "takosumi-platform"
main = "worker.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[[routes]]
pattern = "takosumi.example.com"
custom_domain = true

# Dashboard SPA and static OpenTofu provider mirror assets. The accounts handler
# serves non-API GET/HEAD from this binding (deep links fall back to index.html,
# while /opentofu/providers/* stays file-like and missing files 404).
# run_worker_first lets the worker inspect the request (API namespaces, export
# downloads) before static assets answer.
[assets]
directory = "../../dashboard/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[observability]
enabled = true

# Accounts plane store (session / OIDC / PAT / billing support data).
[[d1_databases]]
binding = "TAKOSUMI_ACCOUNTS_DB"
database_name = "takosumi-accounts"
database_id = "replace-with-accounts-d1-database-id"

# OpenTofu Capsule ledger (Runs / StateVersions / Outputs plus legacy rows during migration).
[[d1_databases]]
binding = "TAKOSUMI_CONTROL_DB"
database_name = "takosumi-deploy"
database_id = "replace-with-deploy-d1-database-id"

# Deploy-control plan/state artifacts.
[[r2_buckets]]
binding = "R2_ARTIFACTS"
bucket_name = "takos-artifacts"

# Source archive snapshots (immutable per-snapshot tar.zst). Written by the
# runner DO during a source_sync run, keyed
# workspaces/{workspaceId}/sources/{sourceId}/snapshots/{snapshotId}/source.tar.zst.
[[r2_buckets]]
binding = "R2_SOURCE"
bucket_name = "takosumi-source"

# OpenTofu state backend (used from M2).
[[r2_buckets]]
binding = "R2_STATE"
bucket_name = "takosumi-state"

# Backup/export artifacts (core-spec.md §26 R2_BACKUPS / §33 control backup).
# Holds sealed zstd control/state/service-data backup bundles written by the
# backups service under workspaces/{workspaceId}/backups/{backupId}/.
[[r2_buckets]]
binding = "R2_BACKUPS"
bucket_name = "takosumi-backups"

# Coordination leases/alarms for the deploy-control plane.
[[durable_objects.bindings]]
name = "COORDINATION"
class_name = "CoordinationObject"

# Per-run execution owner. Queue deliveries schedule this DO and ack quickly;
# the DO alarm owns long controller dispatch and retry/final-failure handling.
[[durable_objects.bindings]]
name = "RUN_OWNER"
class_name = "OpenTofuRunOwnerObject"

# OpenTofu run executor (container-backed DO security sandbox).
[[durable_objects.bindings]]
name = "RUNNER"
class_name = "OpenTofuRunnerObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CoordinationObject", "OpenTofuRunnerObject"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["OpenTofuRunOwnerObject"]

# OpenTofu run executor container. The embedded deploy-control service reaches
# this through its OpenTofu runner adapter (idFromName(runId) -> .fetch). Build
# context is the takosumi repo root: the runner Dockerfile copies
# contract/provider-env-rules.ts (shared provider->env table) alongside
# runner/entrypoint.ts.
[[containers]]
class_name = "OpenTofuRunnerObject"
image = "../../runner/Dockerfile"
image_build_context = "../.."
# Custom sizing: the runner image bakes an OpenTofu provider filesystem mirror
# and each run materializes a per-run workspace (source checkout,
# generated-root files, tofu plan/state, and provider binary cache). 2 vCPU /
# 6 GiB RAM headroom for tofu init/plan/apply; 10 GB disk for the mirror +
# workspace scratch.
instance_type = { vcpu = 2, memory_mib = 6144, disk_mb = 10240 }
max_instances = 10

[[queues.producers]]
binding = "RUN_QUEUE"
queue = "takosumi-runs"

# Consumer: the platform worker validates an identity-only run message, stores
# it in the per-run RUN_OWNER Durable Object, and acks quickly. RUN_OWNER then
# mints credentials through the controller path, drives the container DO, and
# owns retry/final-failure handling outside the queue delivery lifetime. One run
# per delivery keeps scheduling failures isolated.
[[queues.consumers]]
queue = "takosumi-runs"
max_batch_size = 1
max_batch_timeout = 1
max_retries = 2
dead_letter_queue = "takosumi-runs-dlq"

# Dead-letter consumer: marks runs that exhausted retries failed
# ("retries-exhausted") if not already terminal.
[[queues.consumers]]
queue = "takosumi-runs-dlq"
max_batch_size = 10
max_batch_timeout = 5

# Optional platform extensions are not declared in the OSS template. The
# provider-neutral seam (`worker.ts` + `platform_extensions.ts`) reads
# `TAKOSUMI_PLATFORM_EXTENSIONS`; an operator supplies descriptors and matching
# fetch handlers at composition time. The OSS worker owns only authentication,
# scope authorization, catalog discovery, and delegation. A route accepting
# managed-provider run tokens must also declare the exact opaque
# `managedProviderProfile` used by its service-side Provider Connections.

# Scheduled source polling (Core Specification §6). Every 5 minutes the worker's
# scheduled() handler scans active autoSync sources and enqueues a deduped
# source_sync (the consumer ls-remotes and only snapshots when the ref moved).
[triggers]
crons = ["*/5 * * * *"]

[vars]
TAKOSUMI_ACCOUNTS_ISSUER = "https://takosumi.example.com"
TAKOSUMI_ACCOUNTS_SUBJECT = "operator-platform"
# The stock Worker contributes one provider-neutral runner. A composing Worker
# may inject additional profiles and executor adapters through the runtime
# TAKOSUMI_RUNNER_HOST_COMPOSITION object; this text value only enables exact
# contributed profile ids and does not define a provider or runner catalog.
TAKOSUMI_ENABLED_RUNNER_PROFILES = "opentofu-default"
# Optional post-apply release activation bridge. This generic webhook hands
# already-filtered, non-sensitive apply evidence to an operator/Cloud
# materializer that owns app publication (for example Worker/assets/container
# promotion). It does not implement provider-specific publication in OSS.
# TAKOSUMI_RELEASE_ACTIVATOR_URL = "https://materializer.example.com/activate"
# TAKOSUMI_RELEASE_SOURCE_BUCKET = "takosumi-source"
# When the release activator URL is configured, platform readiness access also
# requires these commit-pinned refs/digests from
# `takosumi.release-activation-evidence@v1`:
#   TAKOSUMI_RELEASE_ACTIVATION_SUCCESS_EVIDENCE_REF / _DIGEST
#   TAKOSUMI_RELEASE_ACTIVATION_FAILURE_SURFACING_EVIDENCE_REF / _DIGEST
#   TAKOSUMI_RELEASE_ACTIVATION_LEDGER_INDEPENDENCE_EVIDENCE_REF / _DIGEST
#   TAKOSUMI_RELEASE_ACTIVATION_PAYLOAD_BOUNDARY_EVIDENCE_REF / _DIGEST
# OpenTofu runner capacity knob. Runner DO ids are currently run-scoped, so a
# positive keepalive keeps that run's container alive but does not reuse it for
# the next source_sync / compatibility / plan / apply run. Keep this at "0"
# until stable runner affinity exists; otherwise bursty installs can exhaust
# Cloudflare container max_instances.
TAKOSUMI_RUNNER_KEEPALIVE_SECONDS = "0"
# Provider binaries only; credentials, generated roots, plans, state, and
# outputs remain run/ledger scoped. This path is inside the runner container.
TAKOSUMI_OPENTOFU_PLUGIN_CACHE_DIR = "/tmp/takosumi-provider-cache"
# Lower zstd levels trade a slightly larger SourceSnapshot archive for faster
# first install/source_sync. The runner validates the accepted range.
TAKOSUMI_SOURCE_ARCHIVE_ZSTD_LEVEL = "1"
# Keep scheduled source_sync from competing with user-facing plan/apply/destroy
# runs for runner container capacity.
TAKOSUMI_SCHEDULED_SOURCE_POLL_BATCH = "5"
# Read-only Resource Shape observation follows TAKOSUMI_RESOURCE_SHAPES by
# default. Set TAKOSUMI_RESOURCE_OBSERVATION_ENABLED="0" to pause it, or "1"
# to keep observing existing Resources while public shape creation is disabled.
TAKOSUMI_RESOURCE_OBSERVATION_BATCH = "8"
TAKOSUMI_RESOURCE_OBSERVATION_CONCURRENCY = "4"
TAKOSUMI_RESOURCE_OBSERVATION_INTERVAL_SECONDS = "3600"
TAKOSUMI_RESOURCE_OBSERVATION_LEASE_SECONDS = "900"
# Production hardening evidence gate. In observe mode the internal gate reports
# missing/drifted evidence but does not return 503. Platform readiness access
# is accepted only when this gate is "enforce" and the versioned
# TAKOSUMI_PLATFORM_HARDENING_EVIDENCE JSON bundle covers every check in the
# OSS baseline plus any host-code TAKOSUMI_PLATFORM_HARDENING_CONTRIBUTIONS.
# The evidence validator emits the non-secret bundle from immutable, reviewed
# operator evidence. Substrate/provider-specific definitions belong to the
# composing host contribution, not this reference template.
# The internal `/internal/platform/hardening-gates` route is operator-bearer
# gated and returns 503 only in enforce mode while any required proof is missing.
TAKOSUMI_PRODUCTION_HARDENING_GATE = "observe"

# Required secrets (pushed via `wrangler secret put`, NEVER committed):
#   TAKOSUMI_ACCOUNTS_ES256_PRIVATE_JWK            stable OIDC signing key (JWK JSON)
#   TAKOSUMI_ACCOUNTS_ES256_KEY_ID                 signing key id (kid)
#   TAKOSUMI_ACCOUNTS_ES256_PREVIOUS_PUBLIC_JWKS   optional public-only JWKS for signing-key rotation overlap
#   TAKOSUMI_SECRET_STORE_PASSPHRASE               sealed SecretBlob/vault passphrase
#   TAKOSUMI_ACCOUNTS_OIDC_PAIRWISE_SUBJECT_SECRET pairwise OIDC subject secret
#   TAKOSUMI_ACCOUNT_SESSION_HASH_SALT             account session hash-at-rest salt
#   TAKOSUMI_ACCOUNTS_SUBJECT_SECRET               upstream OAuth subject mapping secret
#   TAKOSUMI_ACCOUNTS_PRIVACY_OPERATIONS_TOKEN     operator token for privacy request completion
#   TAKOSUMI_DEPLOY_CONTROL_TOKEN                  accounts/control-plane bearer
#   TAKOSUMI_METRICS_SCRAPE_TOKEN                  Prometheus `/metrics` scrape bearer
# Optional release activation webhook:
#   TAKOSUMI_RELEASE_ACTIVATOR_TOKEN               required only when TAKOSUMI_RELEASE_ACTIVATOR_URL is set
# Commercial payment-provider credentials belong to the host extension and are
# intentionally absent from this OSS deployment template.
# Optional upstream OAuth providers:
#   [vars] TAKOSUMI_ACCOUNTS_UPSTREAM_PROVIDERS   explicit descriptor JSON
#   [secret] each descriptor's clientSecretEnv    runtime secret binding
