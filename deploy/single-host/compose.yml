# Takosumi Service — single-host reference distribution.
#
# Substrate-neutral service/storage example for operators that do not want the
# Cloudflare Worker + D1 + R2 profile. OpenTofu execution is not embedded here;
# operators attach an external runner through RunnerProfile.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: takosumi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: takosumi
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-takosumi-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U takosumi -d takosumi"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-takosumi}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  service:
    build:
      context: ../..
      dockerfile: deploy/single-host/Dockerfile.service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      TAKOSUMI_ENVIRONMENT: ${TAKOSUMI_ENVIRONMENT:-production}
      TAKOSUMI_DATABASE_URL: postgres://takosumi:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/takosumi
      TAKOSUMI_DEPLOY_CONTROL_TOKEN: ${TAKOSUMI_DEPLOY_CONTROL_TOKEN:?set TAKOSUMI_DEPLOY_CONTROL_TOKEN in .env}
      TAKOSUMI_INTERNAL_API_SECRET: ${TAKOSUMI_INTERNAL_API_SECRET:?set TAKOSUMI_INTERNAL_API_SECRET in .env}
      TAKOSUMI_DB_AUTO_MIGRATE: "true"
      PORT: "8788"
    expose:
      - "8788"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - service
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.example:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  minio-data:
  caddy-data:
  caddy-config:
