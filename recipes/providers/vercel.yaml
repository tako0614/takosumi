id: vercel
display_name: Vercel
secret_partition: provider-credentials
terraform_source:
  - vercel/vercel
  - registry.opentofu.org/vercel/vercel
env_names:
  - VERCEL_API_TOKEN
required_env_groups:
  - [VERCEL_API_TOKEN]
auth_modes:
  api_token:
    presentation:
      show_in_connection_setup: true
      display_name: { en: API token, ja: API トークン }
    input_hints:
      VERCEL_API_TOKEN:
        label: { en: API token, ja: API トークン }
        required: true
    env:
      VERCEL_API_TOKEN:
        from: secret
        name: api_token
