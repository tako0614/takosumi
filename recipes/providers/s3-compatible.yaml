id: s3-compatible
display_name: S3-compatible object storage
secret_partition: provider-credentials
terraform_source:
  - hashicorp/aws
  - registry.opentofu.org/hashicorp/aws
env_names:
  - AWS_ACCESS_KEY_ID
  - AWS_SECRET_ACCESS_KEY
  - AWS_REGION
  - AWS_DEFAULT_REGION
  - AWS_ENDPOINT_URL_S3
required_env_groups:
  - [AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY]
auth_modes:
  static_keys_with_endpoint:
    presentation:
      show_in_connection_setup: true
      display_name: { en: Static keys with endpoint, ja: 静的キーと endpoint }
      description:
        en: Use credentials and an endpoint issued by your S3-compatible service operator.
        ja: 利用する S3 互換サービスの運用者が発行した認証情報と endpoint を使います。
    input_hints:
      AWS_ACCESS_KEY_ID:
        label: { en: Access key ID, ja: アクセスキー ID }
        required: true
      AWS_SECRET_ACCESS_KEY:
        label: { en: Secret access key, ja: シークレットアクセスキー }
        required: true
      AWS_REGION:
        label: { en: Region, ja: リージョン }
        placeholder: auto
        required: false
      AWS_DEFAULT_REGION:
        hidden: true
      AWS_ENDPOINT_URL_S3:
        label: { en: S3 endpoint URL, ja: S3 endpoint URL }
        placeholder: https://objects.example.com
        required: true
    env:
      AWS_ACCESS_KEY_ID:
        from: secret
        name: access_key_id
      AWS_SECRET_ACCESS_KEY:
        from: secret
        name: secret_access_key
      AWS_REGION:
        from: value
        name: region
      AWS_DEFAULT_REGION:
        from: value
        name: region
      AWS_ENDPOINT_URL_S3:
        from: value
        name: endpoint
