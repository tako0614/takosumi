id: digitalocean
display_name: DigitalOcean
secret_partition: provider-credentials
terraform_source:
  - digitalocean/digitalocean
  - registry.opentofu.org/digitalocean/digitalocean
env_names:
  - DIGITALOCEAN_TOKEN
  - SPACES_ACCESS_KEY_ID
  - SPACES_SECRET_ACCESS_KEY
required_env_groups:
  - [DIGITALOCEAN_TOKEN]
auth_modes:
  token:
    presentation:
      show_in_connection_setup: true
      display_name: { en: API token, ja: API トークン }
    input_hints:
      DIGITALOCEAN_TOKEN:
        label: { en: API token, ja: API トークン }
        required: true
    env:
      DIGITALOCEAN_TOKEN:
        from: secret
        name: token
  spaces:
    presentation:
      show_in_connection_setup: true
      display_name:
        { en: API token and Spaces keys, ja: API トークンと Spaces キー }
    input_hints:
      DIGITALOCEAN_TOKEN:
        label: { en: API token, ja: API トークン }
        required: true
      SPACES_ACCESS_KEY_ID:
        label: { en: Spaces access key ID, ja: Spaces アクセスキー ID }
        required: true
      SPACES_SECRET_ACCESS_KEY:
        label:
          { en: Spaces secret access key, ja: Spaces シークレットアクセスキー }
        required: true
    env:
      DIGITALOCEAN_TOKEN:
        from: secret
        name: token
      SPACES_ACCESS_KEY_ID:
        from: secret
        name: spaces_access_key_id
      SPACES_SECRET_ACCESS_KEY:
        from: secret
        name: spaces_secret_access_key
