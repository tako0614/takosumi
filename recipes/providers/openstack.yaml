id: openstack
display_name: OpenStack
secret_partition: provider-credentials
terraform_source:
  - terraform-provider-openstack/openstack
  - registry.opentofu.org/terraform-provider-openstack/openstack
env_names:
  - OS_CLOUD
  - OS_AUTH_URL
  - OS_USERNAME
  - OS_PASSWORD
  - OS_PROJECT_NAME
  - OS_USER_DOMAIN_NAME
  - OS_PROJECT_DOMAIN_NAME
  - OS_REGION_NAME
  - OS_APPLICATION_CREDENTIAL_ID
  - OS_APPLICATION_CREDENTIAL_SECRET
required_env_groups:
  - [OS_CLOUD]
  - [OS_AUTH_URL, OS_USERNAME, OS_PASSWORD, OS_PROJECT_NAME]
  - [
      OS_AUTH_URL,
      OS_APPLICATION_CREDENTIAL_ID,
      OS_APPLICATION_CREDENTIAL_SECRET,
    ]
auth_modes:
  cloud_profile:
    env:
      OS_CLOUD:
        from: value
        name: cloud
  password:
    presentation:
      show_in_connection_setup: true
      display_name: { en: Username and password, ja: ユーザー名とパスワード }
    input_hints:
      OS_AUTH_URL:
        label: { en: Identity endpoint, ja: Identity endpoint }
        placeholder: https://identity.example.com/v3
        required: true
      OS_USERNAME:
        label: { en: Username, ja: ユーザー名 }
        required: true
      OS_PASSWORD:
        label: { en: Password, ja: パスワード }
        required: true
      OS_PROJECT_NAME:
        label: { en: Project name, ja: プロジェクト名 }
        required: true
      OS_USER_DOMAIN_NAME:
        label: { en: User domain, ja: ユーザードメイン }
        required: false
      OS_PROJECT_DOMAIN_NAME:
        label: { en: Project domain, ja: プロジェクトドメイン }
        required: false
      OS_REGION_NAME:
        label: { en: Region, ja: リージョン }
        required: false
    env:
      OS_AUTH_URL:
        from: value
        name: auth_url
      OS_USERNAME:
        from: value
        name: username
      OS_PASSWORD:
        from: secret
        name: password
      OS_PROJECT_NAME:
        from: value
        name: project_name
      OS_USER_DOMAIN_NAME:
        from: value
        name: user_domain_name
      OS_PROJECT_DOMAIN_NAME:
        from: value
        name: project_domain_name
      OS_REGION_NAME:
        from: value
        name: region
  application_credential:
    presentation:
      show_in_connection_setup: true
      display_name: { en: Application credential, ja: Application credential }
    input_hints:
      OS_AUTH_URL:
        label: { en: Identity endpoint, ja: Identity endpoint }
        placeholder: https://identity.example.com/v3
        required: true
      OS_APPLICATION_CREDENTIAL_ID:
        label: { en: Application credential ID, ja: Application credential ID }
        required: true
      OS_APPLICATION_CREDENTIAL_SECRET:
        label:
          {
            en: Application credential secret,
            ja: Application credential secret,
          }
        required: true
      OS_REGION_NAME:
        label: { en: Region, ja: リージョン }
        required: false
    env:
      OS_AUTH_URL:
        from: value
        name: auth_url
      OS_APPLICATION_CREDENTIAL_ID:
        from: secret
        name: application_credential_id
      OS_APPLICATION_CREDENTIAL_SECRET:
        from: secret
        name: application_credential_secret
      OS_REGION_NAME:
        from: value
        name: region
