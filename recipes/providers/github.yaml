id: github
display_name: GitHub
secret_partition: provider-credentials
terraform_source:
  - integrations/github
  - github/github
  - registry.opentofu.org/integrations/github
  - registry.opentofu.org/github/github
env_names:
  - GITHUB_TOKEN
required_env_groups:
  - [GITHUB_TOKEN]
auth_modes:
  token:
    presentation:
      show_in_connection_setup: true
      display_name: { en: Personal access token, ja: Personal access token }
    input_hints:
      GITHUB_TOKEN:
        label: { en: Token, ja: トークン }
        required: true
    env:
      GITHUB_TOKEN:
        from: secret
        name: token
