id: vultr
display_name: Vultr
secret_partition: provider-credentials
terraform_source:
  - vultr/vultr
  - registry.opentofu.org/vultr/vultr
env_names:
  - VULTR_API_KEY
required_env_groups:
  - [VULTR_API_KEY]
auth_modes:
  api_key:
    presentation:
      show_in_connection_setup: true
      display_name: { en: API key, ja: API キー }
    input_hints:
      VULTR_API_KEY:
        label: { en: API key, ja: API キー }
        required: true
    env:
      VULTR_API_KEY:
        from: secret
        name: api_key
