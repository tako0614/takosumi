id: scaleway
display_name: Scaleway
secret_partition: provider-credentials
terraform_source:
  - scaleway/scaleway
  - registry.opentofu.org/scaleway/scaleway
env_names:
  - SCW_ACCESS_KEY
  - SCW_SECRET_KEY
  - SCW_DEFAULT_PROJECT_ID
  - SCW_DEFAULT_ORGANIZATION_ID
  - SCW_DEFAULT_REGION
  - SCW_DEFAULT_ZONE
  - SCW_PROFILE
required_env_groups:
  - [SCW_ACCESS_KEY, SCW_SECRET_KEY]
  - [SCW_PROFILE]
auth_modes:
  access_key:
    presentation:
      show_in_connection_setup: true
      display_name: { en: Access key, ja: アクセスキー }
    input_hints:
      SCW_ACCESS_KEY:
        label: { en: Access key, ja: アクセスキー }
        required: true
      SCW_SECRET_KEY:
        label: { en: Secret key, ja: シークレットキー }
        required: true
      SCW_DEFAULT_PROJECT_ID:
        label: { en: Project ID, ja: プロジェクト ID }
        required: false
      SCW_DEFAULT_ORGANIZATION_ID:
        label: { en: Organization ID, ja: 組織 ID }
        required: false
      SCW_DEFAULT_REGION:
        label: { en: Region, ja: リージョン }
        required: false
      SCW_DEFAULT_ZONE:
        label: { en: Zone, ja: ゾーン }
        required: false
    env:
      SCW_ACCESS_KEY:
        from: secret
        name: access_key
      SCW_SECRET_KEY:
        from: secret
        name: secret_key
      SCW_DEFAULT_PROJECT_ID:
        from: value
        name: project_id
      SCW_DEFAULT_ORGANIZATION_ID:
        from: value
        name: organization_id
      SCW_DEFAULT_REGION:
        from: value
        name: region
      SCW_DEFAULT_ZONE:
        from: value
        name: zone
  profile:
    env:
      SCW_PROFILE:
        from: value
        name: profile
