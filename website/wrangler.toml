# Cloudflare Pages project configuration for the takosumi.com property.
#
# This is the SINGLE Pages project that serves the entire takosumi.com
# property — landing at `/`, VitePress docs at `/docs/*`, and the
# JSON-LD contexts at `/contexts/*`.
#
# `website/build.sh` produces the merged `.output/public/` artifact
# (Solid Start landing + VitePress dist overlaid under `/docs/` +
# spec/contexts/ overlaid under `/contexts/`). Cloudflare Pages serves
# them on the apex `takosumi.com` (and `www.takosumi.com` if attached).
# Custom domains are wired via the Cloudflare Pages dashboard — `wrangler
# pages` does not own DNS.
#
# Operator-side prerequisites (not committed):
#   - Cloudflare account with the `takosumi.com` zone added.
#   - Pages project named `takosumi-website` (created via dashboard or
#     `wrangler pages project create takosumi-website`).
#   - Custom domains `takosumi.com` and `www.takosumi.com` attached
#     to the Pages project.
#
# Once active, the property is reachable at:
#   - https://takosumi.com/                      (landing)
#   - https://takosumi.com/docs/                 (VitePress docs)
#   - https://takosumi.com/contexts/v1.jsonld    (JSON-LD vocab)
# The default `takosumi-website.pages.dev` host stays available for
# preview deploys.
name = "takosumi-website"
compatibility_date = "2026-05-20"
pages_build_output_dir = "./.output/public"
