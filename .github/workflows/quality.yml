name: Takosumi OSS quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: takosumi-oss-quality-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    name: check and test
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned: v6.0.2 (2026)
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # pinned: v2.0.2
        with:
          bun-version: 1.3.14

      - name: Setup Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # pinned: v6.0.0
        with:
          go-version-file: provider/go.mod
          cache-dependency-path: provider/go.sum

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # pinned: v2
        with:
          tofu_version: 1.12.1
          tofu_wrapper: false

      - name: Install locked dependencies
        run: bun install --frozen-lockfile

      - name: Install locked dashboard dependencies
        working-directory: dashboard
        run: bun install --frozen-lockfile

      - name: Run canonical Takosumi checks
        run: bun run check

      - name: Run Takosumi tests
        run: bun test
