name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish artifacts instead of running the dry-run build only"
        required: false
        default: false
        type: boolean

concurrency:
  group: takosumi-release-${{ github.ref }}
  cancel-in-progress: false

env:
  DENO_DIR: ${{ github.workspace }}/.deno-cache

jobs:
  jsr:
    name: JSR packages
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache Deno deps
        uses: actions/cache@v4
        with:
          path: ${{ env.DENO_DIR }}
          key: ${{ runner.os }}-deno-takosumi-release-${{ hashFiles('deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-deno-takosumi-release-

      - run: deno install
      - run: deno task fmt:check
      - run: deno task lint
      - run: deno task check
      - run: deno task test
      - run: deno task publish:dry-run

      - name: Publish JSR packages
        if: github.event_name == 'push' || inputs.publish == true
        run: deno task publish:jsr

  oci:
    name: OCI image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: jsr
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push' || inputs.publish == true
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/takosumi
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Build and publish OCI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/cloudflare/Dockerfile
          push: ${{ github.event_name == 'push' || inputs.publish == true }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
