name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish artifacts instead of running the dry-run build only"
        required: false
        default: false
        type: boolean

concurrency:
  group: takosumi-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  DENO_DIR: ${{ github.workspace }}/.deno-cache
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  jsr:
    name: JSR packages
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned: v6.0.2 (2026)
        with:
          persist-credentials: false

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # pinned: v2.0.4 (2026)
        with:
          deno-version: v2.x

      - name: Cache Deno deps
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # pinned: v5.0.5 (2026)
        with:
          path: ${{ env.DENO_DIR }}
          key: ${{ runner.os }}-deno-takosumi-release-${{ hashFiles('deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-deno-takosumi-release-

      - run: deno install
      - run: deno task fmt:check
      - run: deno task lint
      - run: deno task lint:json-ld
      - run: deno task spec:check-drift
      - run: deno task check
      - run: deno task test
      - run: deno task publish:dry-run

      - name: Publish JSR packages
        if: github.event_name == 'push' || inputs.publish == true
        run: deno task publish:jsr

  oci:
    name: OCI image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: jsr
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned: v6.0.2 (2026)
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # pinned: v3.10.0 (2026)

      - name: Login to GHCR
        if: github.event_name == 'push' || inputs.publish == true
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # pinned: v3.7.0 (2026)
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@c1e51972afc2121e065aed6d45c65596fe445f3f # pinned: v5.8.0 (2026)
        with:
          images: ghcr.io/${{ github.repository_owner }}/takosumi
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Build and publish OCI image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # pinned: v6.19.2 (2026)
        with:
          context: .
          file: deploy/cloudflare/Dockerfile
          push: ${{ github.event_name == 'push' || inputs.publish == true }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
