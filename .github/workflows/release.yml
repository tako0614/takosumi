name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish artifacts instead of running the dry-run build only"
        required: false
        default: false
        type: boolean

concurrency:
  group: takosumi-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  npm:
    name: npm package
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned: v6.0.2 (2026)
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # pinned: v4.4.0 (2026)
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # pinned: v2.0.4 (2026)
        with:
          deno-version: v2.x

      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun test ./src/
      - run: bun run test:scripts
      - run: bun run lint:json-ld
      - run: bun run build:npm -- --no-typecheck
      - run: cd npm && npm pack --dry-run

      - name: Publish npm package
        if: github.event_name == 'push' || inputs.publish == true
        run: cd npm && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  oci:
    name: OCI image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: npm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned: v6.0.2 (2026)
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # pinned: v3.10.0 (2026)

      - name: Login to GHCR
        if: github.event_name == 'push' || inputs.publish == true
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # pinned: v3.7.0 (2026)
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@c1e51972afc2121e065aed6d45c65596fe445f3f # pinned: v5.8.0 (2026)
        with:
          images: ghcr.io/${{ github.repository_owner }}/takosumi
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Build and publish OCI image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # pinned: v6.19.2 (2026)
        with:
          context: .
          file: deploy/cloudflare/Dockerfile
          push: ${{ github.event_name == 'push' || inputs.publish == true }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
