name: Takosumi provider release

on:
  workflow_dispatch:
    inputs:
      phase:
        description: Build one immutable candidate or promote an existing candidate
        required: true
        default: candidate
        type: choice
        options:
          - candidate
          - promote
          - probe
      version:
        description: Assertion; provider/release/version.json remains authoritative
        required: true
        type: string
      release_id:
        description: Operator-private release identifier (promote only)
        required: false
        default: ""
        type: string
      tag:
        description: Exact signed annotated provider tag (promote only)
        required: false
        default: ""
        type: string
      source_commit:
        description: Exact reviewed source commit
        required: false
        default: ""
        type: string
      candidate_run_id:
        description: Successful candidate workflow run id (promote only)
        required: false
        default: ""
        type: string
      candidate_manifest_digest:
        description: Exact SHA-256 of release-candidate-manifest.json
        required: false
        default: ""
        type: string
      envelope_digest:
        description: SHA-256 of the operator-private release envelope
        required: false
        default: ""
        type: string
      controller_commit:
        description: Pinned release-safety controller commit
        required: false
        default: ""
        type: string
      controller_digest:
        description: Pinned release-safety controller tree digest
        required: false
        default: ""
        type: string
      adapter_digest:
        description: Pinned fixed-adapter SHA-256 digest
        required: false
        default: ""
        type: string
      authorization_digest:
        description: Protected controller authorization evidence digest
        required: false
        default: ""
        type: string
      artifact_digests_b64:
        description: Base64url ordered envelope artifact digest JSON
        required: false
        default: ""
        type: string
      health_checks_b64:
        description: Base64url required envelope health-check JSON
        required: false
        default: ""
        type: string
      target_fingerprint:
        description: Expected deterministic stable-target fingerprint
        required: false
        default: ""
        type: string

run-name: ${{ inputs.phase == 'promote' && format('release-safety:provider:{0}:{1}', inputs.release_id, inputs.envelope_digest) || format('provider-release-candidate:{0}:{1}', inputs.version, github.sha) }}

concurrency:
  group: takosumi-provider-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  BUN_VERSION: "1.3.14"
  GO_VERSION: "1.26.5"
  COSIGN_VERSION: "v3.0.6"
  COSIGN_LINUX_AMD64_SHA256: "c956e5dfcac53d52bcf058360d579472f0c1d2d9b69f55209e256fe7783f4c74"
  RELEASE_SAFETY_CONTROLLER_COMMIT: "856ec30dd6c1dbc16e20f4d401fc0b381b35a8e1"
  RELEASE_SAFETY_ADAPTER_DIGEST: "sha256:0f601ba59ae736fcd912b09580228365e8fc64885efbbc2dfa3622060730575f"

jobs:
  probe:
    name: Probe hosted provider toolchain
    if: inputs.phase == 'probe'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout probe source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Go bootstrap
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
          check-latest: false

      - name: Materialize descriptor-pinned Go path
        shell: bash
        run: |
          set -euo pipefail
          descriptor_go_version="$(bun -e 'console.log((await Bun.file("provider/release/version.json").json()).toolchain.go.version)')"
          target_root="$(bun -e 'console.log((await Bun.file("provider/release/version.json").json()).toolchain.go.distributionRoot)')"
          toolchain_module="golang.org/toolchain@v0.0.1-${descriptor_go_version}.linux-amd64"
          source_root="$(
            cd provider
            GOTOOLCHAIN=local go mod download -json "${toolchain_module}" |
              TOOLCHAIN_MODULE="${toolchain_module}" bun -e '
                const value = JSON.parse(await Bun.stdin.text());
                if (`${value.Path}@${value.Version}` !== process.env.TOOLCHAIN_MODULE || value.Error || !value.Dir) process.exit(1);
                console.log(value.Dir);
              '
          )"
          sudo rm -rf "${target_root}"
          sudo mkdir -p "${target_root}"
          sudo cp -a "$(realpath "${source_root}")/." "${target_root}/"

      - name: Capture module tree before restoring execution modes
        run: bun scripts/provider-release.mjs probe-toolchain-tree > provider-toolchain-tree-before.json

      - name: Restore module tool execution modes
        run: |
          target_root="$(bun -e 'console.log((await Bun.file("provider/release/version.json").json()).toolchain.go.distributionRoot)')"
          sudo find "${target_root}/bin" "${target_root}/pkg/tool" -type f -exec chmod 0555 {} +

      - name: Capture read-only toolchain evidence
        run: |
          bun scripts/provider-release.mjs probe-toolchain-tree > provider-toolchain-tree-after.json
          bun scripts/provider-release.mjs probe-toolchain > provider-toolchain-probe.json

      - name: Upload read-only toolchain evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: provider-toolchain-probe-${{ github.run_id }}
          path: |
            provider-toolchain-tree-before.json
            provider-toolchain-tree-after.json
            provider-toolchain-probe.json
          if-no-files-found: error
          retention-days: 1

  candidate:
    name: Build immutable provider candidate
    if: inputs.phase == 'candidate'
    runs-on: ubuntu-26.04
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout exact provider tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned: v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # pinned: v2.0.2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup exact Go distribution
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # pinned: v6.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Materialize descriptor-pinned Go path
        shell: bash
        run: |
          set -euo pipefail
          descriptor_go_version="$(bun -e 'console.log((await Bun.file("provider/release/version.json").json()).toolchain.go.version)')"
          target_root="$(bun -e 'console.log((await Bun.file("provider/release/version.json").json()).toolchain.go.distributionRoot)')"
          if [[ "${descriptor_go_version}" != "go${GO_VERSION}" || "${target_root}" != "/usr/lib/go-${GO_VERSION}" ]]; then
            echo "Provider descriptor and workflow Go pins differ." >&2
            exit 1
          fi
          toolchain_module="golang.org/toolchain@v0.0.1-${descriptor_go_version}.linux-amd64"
          source_root="$(
            cd provider
            GOTOOLCHAIN=local go mod download -json "${toolchain_module}" |
              TOOLCHAIN_MODULE="${toolchain_module}" bun -e '
                const value = JSON.parse(await Bun.stdin.text());
                if (`${value.Path}@${value.Version}` !== process.env.TOOLCHAIN_MODULE || value.Error || !value.Dir) process.exit(1);
                console.log(value.Dir);
              '
          )"
          source_root="$(realpath "${source_root}")"
          sudo rm -rf "${target_root}"
          sudo mkdir -p "${target_root}"
          sudo cp -a "${source_root}/." "${target_root}/"
          sudo find "${target_root}/bin" "${target_root}/pkg/tool" -type f -exec chmod 0555 {} +
          bun scripts/provider-release.mjs verify-toolchain
          "${target_root}/bin/go" version

      - name: Install locked dependencies
        run: bun install --frozen-lockfile

      - name: Install locked dashboard dependencies
        working-directory: dashboard
        run: bun install --frozen-lockfile

      - name: Prime the exact offline Go module cache
        working-directory: provider
        run: /usr/lib/go-${GO_VERSION}/bin/go mod download all

      - name: Validate immutable source identity
        id: source
        shell: bash
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
          REQUESTED_SOURCE_COMMIT: ${{ inputs.source_commit }}
        run: |
          set -euo pipefail
          version="$(bun -e 'console.log((await Bun.file("provider/release/version.json").json()).version)')"
          tag="provider/v${version}"
          source_commit="$(git rev-parse HEAD)"
          if [[ "${GITHUB_RUN_ATTEMPT}" != "1" ]]; then
            echo "Provider candidates are immutable; dispatch a new run after failure." >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_TYPE}" != "tag" || "${GITHUB_REF_NAME}" != "${tag}" ]]; then
            echo "Candidate workflow must be dispatched on exact tag ${tag}." >&2
            exit 1
          fi
          if [[ "${REQUESTED_VERSION}" != "${version}" ]]; then
            echo "Requested version does not match provider/release/version.json." >&2
            exit 1
          fi
          if [[ -n "${REQUESTED_SOURCE_COMMIT}" && "${REQUESTED_SOURCE_COMMIT}" != "${source_commit}" ]]; then
            echo "Requested source commit does not match the tagged checkout." >&2
            exit 1
          fi
          bun run provider:release:verify-tag -- \
            --source-commit "${source_commit}" \
            --tag "${tag}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "source_commit=${source_commit}" >> "${GITHUB_OUTPUT}"
          echo "source_commit_short=${source_commit:0:12}" >> "${GITHUB_OUTPUT}"

      - name: Run canonical Takosumi quality gates
        run: bun run check

      - name: Run Takosumi tests
        run: bun test

      - name: Build and verify deterministic provider release bundle
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.source.outputs.tag }}
          SOURCE_COMMIT: ${{ steps.source.outputs.source_commit }}
        run: |
          set -euo pipefail
          bundle_root="${RUNNER_TEMP}/takosumi-provider-release-bundle"
          test ! -e "${bundle_root}"
          bun run provider:release:build -- \
            --output "${bundle_root}" \
            --source-commit "${SOURCE_COMMIT}" \
            --tag "${RELEASE_TAG}"
          bun run provider:release:verify -- --root "${bundle_root}"

      - name: Seal exact candidate bytes
        id: candidate
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.source.outputs.version }}
        run: |
          set -euo pipefail
          bundle_root="${RUNNER_TEMP}/takosumi-provider-release-bundle"
          candidate_root="${RUNNER_TEMP}/takosumi-provider-release-candidate"
          built_at="$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"
          bun run provider:release:candidate -- prepare \
            --bundle "${bundle_root}" \
            --output "${candidate_root}" \
            --workflow-run-id "${GITHUB_RUN_ID}" \
            --built-at "${built_at}"
          bun run provider:release:candidate -- verify \
            --candidate "${candidate_root}"
          digest="sha256:$(sha256sum "${candidate_root}/release-candidate-manifest.json" | awk '{print $1}')"
          printf '%s\n' "${digest}" > "${RUNNER_TEMP}/provider-candidate-digest.txt"
          echo "manifest_digest=${digest}" >> "${GITHUB_OUTPUT}"
          echo "Candidate manifest: ${digest}" >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload one immutable candidate artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # pinned: v7.0.1
        with:
          name: takosumi-provider-release-candidate-${{ steps.source.outputs.version }}-${{ steps.source.outputs.source_commit_short }}
          path: ${{ runner.temp }}/takosumi-provider-release-candidate/
          if-no-files-found: error
          include-hidden-files: false

  promote:
    name: Promote exact provider candidate
    if: inputs.phase == 'promote'
    runs-on: ubuntu-26.04
    timeout-minutes: 45
    environment: provider-release
    permissions:
      actions: read
      attestations: write
      contents: write
      id-token: write
    steps:
      - name: Checkout exact reviewed source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned: v6.0.2
        with:
          ref: ${{ inputs.source_commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # pinned: v2.0.2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup exact Go distribution
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # pinned: v6.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Materialize descriptor-pinned Go path
        shell: bash
        run: |
          set -euo pipefail
          descriptor_go_version="$(bun -e 'console.log((await Bun.file("provider/release/version.json").json()).toolchain.go.version)')"
          target_root="$(bun -e 'console.log((await Bun.file("provider/release/version.json").json()).toolchain.go.distributionRoot)')"
          if [[ "${descriptor_go_version}" != "go${GO_VERSION}" || "${target_root}" != "/usr/lib/go-${GO_VERSION}" ]]; then
            echo "Provider descriptor and workflow Go pins differ." >&2
            exit 1
          fi
          toolchain_module="golang.org/toolchain@v0.0.1-${descriptor_go_version}.linux-amd64"
          source_root="$(
            cd provider
            GOTOOLCHAIN=local go mod download -json "${toolchain_module}" |
              TOOLCHAIN_MODULE="${toolchain_module}" bun -e '
                const value = JSON.parse(await Bun.stdin.text());
                if (`${value.Path}@${value.Version}` !== process.env.TOOLCHAIN_MODULE || value.Error || !value.Dir) process.exit(1);
                console.log(value.Dir);
              '
          )"
          source_root="$(realpath "${source_root}")"
          sudo rm -rf "${target_root}"
          sudo mkdir -p "${target_root}"
          sudo cp -a "${source_root}/." "${target_root}/"
          sudo find "${target_root}/bin" "${target_root}/pkg/tool" -type f -exec chmod 0555 {} +
          bun scripts/provider-release.mjs verify-toolchain
          "${target_root}/bin/go" version

      - name: Install locked dependencies
        run: bun install --frozen-lockfile

      - name: Prime the exact offline Go module cache
        working-directory: provider
        run: /usr/lib/go-${GO_VERSION}/bin/go mod download all

      - name: Validate sealed controller inputs
        id: source
        shell: bash
        env:
          RELEASE_ID: ${{ inputs.release_id }}
          REQUESTED_VERSION: ${{ inputs.version }}
          RELEASE_TAG: ${{ inputs.tag }}
          SOURCE_COMMIT: ${{ inputs.source_commit }}
          CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
          CANDIDATE_MANIFEST_DIGEST: ${{ inputs.candidate_manifest_digest }}
          ENVELOPE_DIGEST: ${{ inputs.envelope_digest }}
          CONTROLLER_COMMIT: ${{ inputs.controller_commit }}
          CONTROLLER_DIGEST: ${{ inputs.controller_digest }}
          ADAPTER_DIGEST: ${{ inputs.adapter_digest }}
          AUTHORIZATION_DIGEST: ${{ inputs.authorization_digest }}
          ARTIFACT_DIGESTS_B64: ${{ inputs.artifact_digests_b64 }}
          HEALTH_CHECKS_B64: ${{ inputs.health_checks_b64 }}
          TARGET_FINGERPRINT: ${{ inputs.target_fingerprint }}
        run: |
          set -euo pipefail
          for value in RELEASE_ID REQUESTED_VERSION RELEASE_TAG SOURCE_COMMIT CANDIDATE_RUN_ID CANDIDATE_MANIFEST_DIGEST ENVELOPE_DIGEST CONTROLLER_COMMIT CONTROLLER_DIGEST ADAPTER_DIGEST AUTHORIZATION_DIGEST ARTIFACT_DIGESTS_B64 HEALTH_CHECKS_B64 TARGET_FINGERPRINT; do
            if [[ -z "${!value}" ]]; then
              echo "${value} is required for provider promotion." >&2
              exit 1
            fi
          done
          if [[ "${GITHUB_RUN_ATTEMPT}" != "1" ]]; then
            echo "Provider promotion runs cannot be rerun; publish a new version after failure." >&2
            exit 1
          fi
          version="$(bun -e 'console.log((await Bun.file("provider/release/version.json").json()).version)')"
          expected_tag="provider/v${version}"
          checkout_commit="$(git rev-parse HEAD)"
          if [[ "${REQUESTED_VERSION}" != "${version}" || "${RELEASE_TAG}" != "${expected_tag}" ]]; then
            echo "Promotion version/tag differs from the provider release descriptor." >&2
            exit 1
          fi
          if [[ "${SOURCE_COMMIT}" != "${checkout_commit}" || ! "${SOURCE_COMMIT}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Promotion source commit differs from the exact checkout." >&2
            exit 1
          fi
          if [[ ! "${CANDIDATE_RUN_ID}" =~ ^[1-9][0-9]*$ ]]; then
            echo "candidate_run_id must be a decimal GitHub Actions run id." >&2
            exit 1
          fi
          for digest in "${CANDIDATE_MANIFEST_DIGEST}" "${ENVELOPE_DIGEST}" "${CONTROLLER_DIGEST}" "${ADAPTER_DIGEST}" "${AUTHORIZATION_DIGEST}" "${TARGET_FINGERPRINT}"; do
            if [[ ! "${digest}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "Promotion authority contains a non-canonical digest." >&2
              exit 1
            fi
          done
          if [[ "${CONTROLLER_COMMIT}" != "${RELEASE_SAFETY_CONTROLLER_COMMIT}" ]]; then
            echo "controller_commit differs from the workflow authority pin." >&2
            exit 1
          fi
          if [[ "${ADAPTER_DIGEST}" != "${RELEASE_SAFETY_ADAPTER_DIGEST}" ]]; then
            echo "adapter_digest differs from the workflow authority pin." >&2
            exit 1
          fi
          bun run provider:release:verify-tag -- \
            --source-commit "${SOURCE_COMMIT}" \
            --tag "${RELEASE_TAG}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "source_commit_short=${SOURCE_COMMIT:0:12}" >> "${GITHUB_OUTPUT}"

      - name: Verify candidate workflow authority
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
          SOURCE_COMMIT: ${{ inputs.source_commit }}
        run: |
          set -euo pipefail
          run_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${CANDIDATE_RUN_ID}")"
          jq -e \
            --arg source "${SOURCE_COMMIT}" \
            '.head_sha == $source and
             .event == "workflow_dispatch" and
             .status == "completed" and
             .conclusion == "success" and
             .run_attempt == 1 and
             (.path | endswith("/.github/workflows/provider-release.yml") or . == ".github/workflows/provider-release.yml")' \
            <<<"${run_json}" >/dev/null

      - name: Download the one sealed candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # pinned: v8.0.1
        with:
          name: takosumi-provider-release-candidate-${{ steps.source.outputs.version }}-${{ steps.source.outputs.source_commit_short }}
          path: ${{ runner.temp }}/takosumi-provider-release-candidate
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.candidate_run_id }}

      - name: Verify every candidate byte and envelope binding
        id: candidate
        shell: bash
        env:
          CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
          CANDIDATE_MANIFEST_DIGEST: ${{ inputs.candidate_manifest_digest }}
          ARTIFACT_DIGESTS_B64: ${{ inputs.artifact_digests_b64 }}
          HEALTH_CHECKS_B64: ${{ inputs.health_checks_b64 }}
          RELEASE_TAG: ${{ inputs.tag }}
          SOURCE_COMMIT: ${{ inputs.source_commit }}
          TARGET_FINGERPRINT: ${{ inputs.target_fingerprint }}
        run: |
          set -euo pipefail
          candidate_root="${RUNNER_TEMP}/takosumi-provider-release-candidate"
          candidate_manifest="${candidate_root}/release-candidate-manifest.json"
          bun run provider:release:candidate -- verify --candidate "${candidate_root}"
          actual_manifest_digest="sha256:$(sha256sum "${candidate_manifest}" | awk '{print $1}')"
          if [[ "${actual_manifest_digest}" != "${CANDIDATE_MANIFEST_DIGEST}" ]]; then
            echo "Candidate manifest digest differs from the release envelope." >&2
            exit 1
          fi
          jq -e \
            --arg run "${CANDIDATE_RUN_ID}" \
            --arg source "${SOURCE_COMMIT}" \
            --arg tag "${RELEASE_TAG}" \
            '.workflowRunId == $run and .sourceCommit == $source and .tag == $tag' \
            "${candidate_manifest}" >/dev/null

          bun -e 'process.stdout.write(Buffer.from(process.env.ARTIFACT_DIGESTS_B64, "base64url"))' \
            > "${RUNNER_TEMP}/expected-artifact-digests.json"
          bun -e 'process.stdout.write(Buffer.from(process.env.HEALTH_CHECKS_B64, "base64url"))' \
            > "${RUNNER_TEMP}/required-health-checks.json"
          jq -e 'type == "array" and length > 0 and all(.[]; type == "string" and test("^sha256:[0-9a-f]{64}$"))' \
            "${RUNNER_TEMP}/expected-artifact-digests.json" >/dev/null
          jq -e '
            . == [
              {name: "stable GitHub release asset readback", status: "required", bindingDigest: .[0].bindingDigest},
              {name: "Sigstore bundle and transparency readback", status: "required", bindingDigest: .[1].bindingDigest}
            ] and
            all(.[].bindingDigest; type == "string" and test("^sha256:[0-9a-f]{64}$"))' \
            "${RUNNER_TEMP}/required-health-checks.json" >/dev/null
          expected_artifacts="$(jq -c . "${RUNNER_TEMP}/expected-artifact-digests.json")"
          actual_artifacts="$(jq -c '.artifactDigests' "${candidate_manifest}")"
          if [[ "${expected_artifacts}" != "${actual_artifacts}" ]]; then
            echo "Envelope artifact digests differ from the candidate in order." >&2
            exit 1
          fi

          release_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"
          target_json="$(jq -cnS --arg tag "${RELEASE_TAG}" --arg url "${release_url}" \
            '{release: {tag: $tag, url: $url}, ociImages: []}')"
          computed_target="sha256:$(printf '%s' "${target_json}" | sha256sum | awk '{print $1}')"
          if [[ "${computed_target}" != "${TARGET_FINGERPRINT}" ]]; then
            echo "Stable provider target fingerprint differs from the envelope." >&2
            exit 1
          fi
          echo "manifest=${candidate_manifest}" >> "${GITHUB_OUTPUT}"
          echo "release_url=${release_url}" >> "${GITHUB_OUTPUT}"

      - name: Refuse an existing immutable release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "GitHub release ${RELEASE_TAG} already exists; provider versions are never overwritten." >&2
            exit 1
          fi

      - name: Install pinned cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # pinned: v3.10.1
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      - name: Keyless-sign and offline-verify the exact release manifest
        id: signature
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          SOURCE_COMMIT: ${{ inputs.source_commit }}
        run: |
          set -euo pipefail
          candidate_root="${RUNNER_TEMP}/takosumi-provider-release-candidate"
          generated_root="${RUNNER_TEMP}/takosumi-provider-release-generated"
          mkdir -m 0700 "${generated_root}"
          subject="${candidate_root}/release-manifest.json"
          bundle="${generated_root}/release-manifest.sigstore.json"
          trusted_root="${GITHUB_WORKSPACE}/provider/release/trust/sigstore-trusted-root.json"
          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/provider-release.yml@refs/tags/${RELEASE_TAG}"
          if [[ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" || "${GITHUB_REF}" != "refs/tags/${RELEASE_TAG}" ]]; then
            echo "Keyless provider signing requires workflow_dispatch on the exact release tag." >&2
            exit 1
          fi
          cosign_path="$(realpath "$(command -v cosign)")"
          printf '%s  %s\n' "${COSIGN_LINUX_AMD64_SHA256}" "${cosign_path}" | sha256sum --check --strict
          test "$(cosign version --json | jq -er .gitVersion)" = "${COSIGN_VERSION}"
          cosign sign-blob \
            --yes \
            --new-bundle-format=true \
            --bundle "${bundle}" \
            "${subject}"
          cosign verify-blob \
            --new-bundle-format=true \
            --bundle "${bundle}" \
            --trusted-root "${trusted_root}" \
            --certificate-identity "${identity}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-github-workflow-repository "${GITHUB_REPOSITORY}" \
            --certificate-github-workflow-ref "refs/tags/${RELEASE_TAG}" \
            --certificate-github-workflow-sha "${SOURCE_COMMIT}" \
            --certificate-github-workflow-trigger "workflow_dispatch" \
            "${subject}"
          bun run provider:release:approval -- finalize \
            --candidate "${candidate_root}/release-candidate-manifest.json" \
            --subject "${subject}" \
            --bundle "${bundle}" \
            --workflow-run-id "${GITHUB_RUN_ID}" \
            --output "${generated_root}/provider-release-approval.json"
          bun run provider:release:approval -- verify \
            --approval "${generated_root}/provider-release-approval.json" \
            --candidate "${candidate_root}/release-candidate-manifest.json" \
            --subject "${subject}" \
            --bundle "${bundle}"
          bundle_digest="sha256:$(sha256sum "${bundle}" | awk '{print $1}')"
          echo "bundle_digest=${bundle_digest}" >> "${GITHUB_OUTPUT}"

      - name: Create a new draft release from exact candidate bytes
        id: draft
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_VERSION: ${{ steps.source.outputs.version }}
        run: |
          set -euo pipefail
          candidate_root="${RUNNER_TEMP}/takosumi-provider-release-candidate"
          generated_root="${RUNNER_TEMP}/takosumi-provider-release-generated"
          mapfile -t release_assets < <(
            jq -r '.releaseAssets[].name' "${candidate_root}/release-candidate-manifest.json" |
              while IFS= read -r name; do printf '%s\n' "${candidate_root}/${name}"; done
          )
          gh release create "${RELEASE_TAG}" \
            "${release_assets[@]}" \
            "${candidate_root}/release-candidate-manifest.json" \
            "${generated_root}/release-manifest.sigstore.json" \
            "${generated_root}/provider-release-approval.json" \
            --draft \
            --verify-tag \
            --title "Takosumi provider v${RELEASE_VERSION}" \
            --notes-from-tag
          encoded_tag="$(jq -rn --arg value "${RELEASE_TAG}" '$value | @uri')"
          release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${encoded_tag}" --jq .id)"
          echo "release_id=${release_id}" >> "${GITHUB_OUTPUT}"

      - name: Verify exact draft release inventory
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          candidate_root="${RUNNER_TEMP}/takosumi-provider-release-candidate"
          generated_root="${RUNNER_TEMP}/takosumi-provider-release-generated"
          readback_root="${RUNNER_TEMP}/takosumi-provider-draft-readback"
          mkdir -m 0700 "${readback_root}"
          encoded_tag="$(jq -rn --arg value "${RELEASE_TAG}" '$value | @uri')"
          release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${encoded_tag}")"
          jq -e --arg tag "${RELEASE_TAG}" '.tag_name == $tag and .draft == true and .prerelease == false' \
            <<<"${release_json}" >/dev/null
          {
            jq -r '.releaseAssets[].name' "${candidate_root}/release-candidate-manifest.json"
            printf '%s\n' release-candidate-manifest.json provider-release-approval.json release-manifest.sigstore.json
          } | sort > "${RUNNER_TEMP}/expected-provider-draft-assets.txt"
          jq -r '.assets[].name' <<<"${release_json}" | sort > "${RUNNER_TEMP}/actual-provider-draft-assets.txt"
          diff -u "${RUNNER_TEMP}/expected-provider-draft-assets.txt" "${RUNNER_TEMP}/actual-provider-draft-assets.txt"
          gh release download "${RELEASE_TAG}" --dir "${readback_root}"
          while IFS=$'\t' read -r name digest; do
            test "sha256:$(sha256sum "${readback_root}/${name}" | awk '{print $1}')" = "${digest}"
          done < <(jq -r '.releaseAssets[] | [.name, .digest] | @tsv' "${candidate_root}/release-candidate-manifest.json")
          cmp -s "${candidate_root}/release-candidate-manifest.json" "${readback_root}/release-candidate-manifest.json"
          cmp -s "${generated_root}/provider-release-approval.json" "${readback_root}/provider-release-approval.json"
          cmp -s "${generated_root}/release-manifest.sigstore.json" "${readback_root}/release-manifest.sigstore.json"

      - name: Attest the exact provider release assets
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # pinned: v4.1.1
        with:
          subject-path: |
            ${{ runner.temp }}/takosumi-provider-release-candidate/*
            ${{ runner.temp }}/takosumi-provider-release-generated/provider-release-approval.json
            ${{ runner.temp }}/takosumi-provider-release-generated/release-manifest.sigstore.json

      - name: Write and retain the common release-safety readback
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
          SOURCE_COMMIT: ${{ inputs.source_commit }}
          CONTROLLER_COMMIT: ${{ inputs.controller_commit }}
          CONTROLLER_DIGEST: ${{ inputs.controller_digest }}
          ADAPTER_DIGEST: ${{ inputs.adapter_digest }}
          TARGET_FINGERPRINT: ${{ inputs.target_fingerprint }}
          RELEASE_URL: ${{ steps.candidate.outputs.release_url }}
          SIGSTORE_BUNDLE_DIGEST: ${{ steps.signature.outputs.bundle_digest }}
        run: |
          set -euo pipefail
          candidate_root="${RUNNER_TEMP}/takosumi-provider-release-candidate"
          generated_root="${RUNNER_TEMP}/takosumi-provider-release-generated"
          jq '[.[] | .status = "passed"]' "${RUNNER_TEMP}/required-health-checks.json" \
            > "${RUNNER_TEMP}/passed-health-checks.json"
          readback_at="$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"
          jq -n \
            --arg kind "takos.release-safety-adapter-result@v1" \
            --arg status promoted \
            --arg surfaceId takosumi-provider \
            --arg sourceCommit "${SOURCE_COMMIT}" \
            --arg controllerCommit "${CONTROLLER_COMMIT}" \
            --arg controllerDigest "${CONTROLLER_DIGEST}" \
            --arg adapterDigest "${ADAPTER_DIGEST}" \
            --arg targetFingerprint "${TARGET_FINGERPRINT}" \
            --arg attestationDigest "${SIGSTORE_BUNDLE_DIGEST}" \
            --arg releaseTag "${RELEASE_TAG}" \
            --arg releaseUrl "${RELEASE_URL}" \
            --arg workflowRunId "${GITHUB_RUN_ID}" \
            --arg readbackAt "${readback_at}" \
            --slurpfile manifest "${candidate_root}/release-candidate-manifest.json" \
            --slurpfile healthChecks "${RUNNER_TEMP}/passed-health-checks.json" \
            '{kind: $kind, status: $status, surfaceId: $surfaceId,
              sourceCommit: $sourceCommit, controllerCommit: $controllerCommit,
              controllerDigest: $controllerDigest, adapterDigest: $adapterDigest,
              artifactDigests: $manifest[0].artifactDigests,
              targetFingerprint: $targetFingerprint,
              attestationDigest: $attestationDigest, releaseTag: $releaseTag,
              releaseUrl: $releaseUrl, workflowRunId: $workflowRunId,
              readbackAt: $readbackAt, healthChecks: $healthChecks[0]}' \
            > "${generated_root}/release-safety-readback.json"
          chmod 0600 "${generated_root}/release-safety-readback.json"
          gh release upload "${RELEASE_TAG}" "${generated_root}/release-safety-readback.json"

      - name: Verify complete draft and publish it once
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.draft.outputs.release_id }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          candidate_root="${RUNNER_TEMP}/takosumi-provider-release-candidate"
          generated_root="${RUNNER_TEMP}/takosumi-provider-release-generated"
          encoded_tag="$(jq -rn --arg value "${RELEASE_TAG}" '$value | @uri')"
          verify_release() {
            local expected_draft="$1"
            local release_json readback_root
            release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${encoded_tag}")"
            jq -e --arg tag "${RELEASE_TAG}" --argjson draft "${expected_draft}" \
              '.tag_name == $tag and .draft == $draft and .prerelease == false' \
              <<<"${release_json}" >/dev/null
            {
              jq -r '.releaseAssets[].name' "${candidate_root}/release-candidate-manifest.json"
              printf '%s\n' release-candidate-manifest.json provider-release-approval.json release-manifest.sigstore.json release-safety-readback.json
            } | sort > "${RUNNER_TEMP}/expected-provider-assets.txt"
            jq -r '.assets[].name' <<<"${release_json}" | sort > "${RUNNER_TEMP}/actual-provider-assets.txt"
            diff -u "${RUNNER_TEMP}/expected-provider-assets.txt" "${RUNNER_TEMP}/actual-provider-assets.txt"
            readback_root="$(mktemp -d "${RUNNER_TEMP}/provider-release-readback.XXXXXX")"
            chmod 0700 "${readback_root}"
            gh release download "${RELEASE_TAG}" --dir "${readback_root}"
            while IFS=$'\t' read -r name digest; do
              test "sha256:$(sha256sum "${readback_root}/${name}" | awk '{print $1}')" = "${digest}"
            done < <(jq -r '.releaseAssets[] | [.name, .digest] | @tsv' "${candidate_root}/release-candidate-manifest.json")
            cmp -s "${candidate_root}/release-candidate-manifest.json" "${readback_root}/release-candidate-manifest.json"
            for name in provider-release-approval.json release-manifest.sigstore.json release-safety-readback.json; do
              cmp -s "${generated_root}/${name}" "${readback_root}/${name}"
            done
            bun run provider:release:approval -- verify \
              --approval "${readback_root}/provider-release-approval.json" \
              --candidate "${readback_root}/release-candidate-manifest.json" \
              --subject "${readback_root}/release-manifest.json" \
              --bundle "${readback_root}/release-manifest.sigstore.json"
          }
          verify_release true
          finalized="$(gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
            -F draft=false -F prerelease=false -F make_latest=true)"
          jq -e '.draft == false and .prerelease == false' <<<"${finalized}" >/dev/null
          verify_release false

      - name: Upload adapter readback evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # pinned: v7.0.1
        with:
          name: release-safety-readback-${{ inputs.release_id }}
          path: ${{ runner.temp }}/takosumi-provider-release-generated/release-safety-readback.json
          if-no-files-found: error
