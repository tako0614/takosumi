name: Deploy takosumi.com website to Cloudflare Pages

# The single `takosumi-website` Pages project serves the public property:
#
#   https://takosumi.com/                       (landing, Solid Start)
#   https://takosumi.com/docs/                  (VitePress reference docs)
#
# `website/build.sh` runs `vinxi build` for the landing and `vitepress
# build` for the docs overlaid onto `.output/public/docs/`.

on:
  push:
    branches: [master]
    paths:
      - "website/**"
      - "docs/**"
      - ".github/workflows/website-deploy.yml"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "CHANGELOG.md"
  pull_request:
    branches: [master]
    paths:
      - "website/**"
      - "docs/**"
      - ".github/workflows/website-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned: v6.0.2 (2026)
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # pinned: v4.4.0 (2026)
        with:
          node-version: "20"

      - name: Install website dependencies (Solid Start)
        working-directory: website
        run: npm install --no-audit --no-fund

      - name: Install docs dependencies (VitePress)
        working-directory: docs
        run: npm install --no-audit --no-fund

      - name: Build merged Pages artifact (landing + /docs/)
        run: bash website/build.sh

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: cloudflare/pages-action@f0a1cd58cd66095dee69bfa18fa5efd1dde93bca # pinned: v1.5.0 (2026)
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: takosumi-website
          directory: website/.output/public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
