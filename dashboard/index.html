<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Takosumi</title>
    <meta
      name="description"
      content="Takosumi dashboard for hosting services with connected provider credentials."
    />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#f6f7f9" />
    <link rel="icon" type="image/png" href="/tako.png" />
    <link rel="apple-touch-icon" href="/tako.png" />
    <script>
      (() => {
        try {
          const stored = localStorage.getItem("tg_theme");
          const preference =
            stored === "light" || stored === "dark" || stored === "system"
              ? stored
              : "system";
          const resolved =
            preference === "dark" ||
            (preference === "system" &&
              matchMedia("(prefers-color-scheme: dark)").matches)
              ? "dark"
              : "light";
          document.documentElement.dataset.theme = resolved;
          document.documentElement.dataset.themePreference = preference;
          document.documentElement.style.colorScheme = resolved;
          const themeColor = document.querySelector('meta[name="theme-color"]');
          if (themeColor) {
            themeColor.setAttribute(
              "content",
              resolved === "dark" ? "#101316" : "#f6f7f9",
            );
          }
        } catch {
          document.documentElement.dataset.theme = "light";
          document.documentElement.dataset.themePreference = "system";
        }
      })();
    </script>
    <style>
      html,
      body {
        margin: 0;
        background: #f6f7f9;
        color: #111827;
      }
      html[data-theme="dark"],
      html[data-theme="dark"] body {
        background: #101316;
        color: #f7f7f8;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
