name: Takosumi Deploy
description: Submit a Source to the Takosumi installer API.

inputs:
  source:
    description: Source input (git URL, prepared source URL, or local path).
    required: true
    default: .
  space:
    description: Target Takosumi Space id.
    required: true
  remote-url:
    description: Base URL of the Takosumi kernel HTTP server.
    required: true
  token:
    description: Installer bearer for /v1/installations/*.
    required: true
  mode:
    description: apply or dry-run.
    required: false
    default: apply
  cli-version:
    description: npm version of @takosjp/takosumi to run (provides the takosumi CLI bin).
    required: false
    default: 0.17.0
  bun-version:
    description: Bun version passed to oven-sh/setup-bun.
    required: false
    default: latest

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Deploy source
      shell: bash
      env:
        TAKOSUMI_ACTION_SOURCE: ${{ inputs.source }}
        TAKOSUMI_ACTION_SPACE: ${{ inputs.space }}
        TAKOSUMI_ACTION_REMOTE_URL: ${{ inputs.remote-url }}
        TAKOSUMI_ACTION_MODE: ${{ inputs.mode }}
        TAKOSUMI_ACTION_CLI_VERSION: ${{ inputs.cli-version }}
        TAKOSUMI_INSTALLER_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail

        case "$TAKOSUMI_ACTION_MODE" in
          apply)
            subcommand=(install "$TAKOSUMI_ACTION_SOURCE")
            ;;
          dry-run)
            subcommand=(install dry-run "$TAKOSUMI_ACTION_SOURCE")
            ;;
          *)
            echo "::error::mode must be 'apply' or 'dry-run'"
            exit 2
            ;;
        esac

        bunx --bun "@takosjp/takosumi@$TAKOSUMI_ACTION_CLI_VERSION" \
          "${subcommand[@]}" \
          --space "$TAKOSUMI_ACTION_SPACE" \
          --remote "$TAKOSUMI_ACTION_REMOTE_URL" \
          --token "$TAKOSUMI_INSTALLER_TOKEN"
