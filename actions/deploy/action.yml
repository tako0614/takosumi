name: Takosumi Deploy
description: Upload a local OpenTofu Capsule to Takosumi and create a plan/apply Run.

inputs:
  source:
    description: Local OpenTofu Capsule directory checked out in this workflow.
    required: true
    default: .
  space:
    description: Target Takosumi Space id.
    required: true
  remote-url:
    description: Takosumi platform origin or deploy-control API base URL.
    required: true
  token:
    description: Takosumi API bearer for /api/v1 upload, deploy, and run reads.
    required: true
  providers:
    description: Comma-separated provider connection bindings, e.g. cloudflare=pcn_cf or cloudflare=takos_provided.
    required: true
  mode:
    description: apply or plan.
    required: false
    default: apply
  cli-version:
    description: npm version of @takosjp/takosumi to run (provides the takosumi CLI bin).
    required: false
    default: 0.17.0
  bun-version:
    description: Bun version passed to oven-sh/setup-bun.
    required: false
    default: latest

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # pinned: v2.0.2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Deploy source
      shell: bash
      env:
        TAKOSUMI_ACTION_SOURCE: ${{ inputs.source }}
        TAKOSUMI_ACTION_SPACE: ${{ inputs.space }}
        TAKOSUMI_ACTION_REMOTE_URL: ${{ inputs.remote-url }}
        TAKOSUMI_ACTION_MODE: ${{ inputs.mode }}
        TAKOSUMI_ACTION_CLI_VERSION: ${{ inputs.cli-version }}
        TAKOSUMI_ACTION_PROVIDERS: ${{ inputs.providers }}
        TAKOSUMI_DEPLOY_CONTROL_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail

        case "$TAKOSUMI_ACTION_MODE" in
          apply)
            subcommand=(deploy "$TAKOSUMI_ACTION_SOURCE")
            ;;
          plan)
            subcommand=(plan "$TAKOSUMI_ACTION_SOURCE")
            ;;
          *)
            echo "::error::mode must be 'apply' or 'plan'"
            exit 2
            ;;
        esac

        provider_args=()
        IFS=',' read -ra providers <<< "$TAKOSUMI_ACTION_PROVIDERS"
        for raw_provider in "${providers[@]}"; do
          provider="$(printf '%s' "$raw_provider" | xargs)"
          if [[ -n "$provider" ]]; then
            provider_args+=(--provider "$provider")
          fi
        done
        if [[ "${#provider_args[@]}" -eq 0 ]]; then
          echo "::error::providers must include at least one OpenTofu provider source address"
          exit 2
        fi

        bunx --bun "@takosjp/takosumi@$TAKOSUMI_ACTION_CLI_VERSION" \
          "${subcommand[@]}" \
          --space "$TAKOSUMI_ACTION_SPACE" \
          --remote "$TAKOSUMI_ACTION_REMOTE_URL" \
          --token "$TAKOSUMI_DEPLOY_CONTROL_TOKEN" \
          "${provider_args[@]}"
