name: Takosumi Deploy
description: Submit an AppSpec source to the Takosumi installer API.

inputs:
  source:
    description: AppSpec source (git:, catalog:, bundle:, or local path).
    required: true
    default: .
  space:
    description: Target Takosumi Space id.
    required: true
  remote-url:
    description: Base URL of the Takosumi kernel HTTP server.
    required: true
  token:
    description: Installer bearer for /v1/installations/*.
    required: true
  mode:
    description: apply or dry-run.
    required: false
    default: apply
  cli-version:
    description: JSR version of @takos/takosumi-cli to run.
    required: false
    default: 0.15.0
  deno-version:
    description: Deno version passed to denoland/setup-deno.
    required: false
    default: v2.x

runs:
  using: composite
  steps:
    - uses: denoland/setup-deno@v2
      with:
        deno-version: ${{ inputs.deno-version }}

    - name: Deploy manifest
      shell: bash
      env:
        TAKOSUMI_ACTION_SOURCE: ${{ inputs.source }}
        TAKOSUMI_ACTION_SPACE: ${{ inputs.space }}
        TAKOSUMI_ACTION_REMOTE_URL: ${{ inputs.remote-url }}
        TAKOSUMI_ACTION_MODE: ${{ inputs.mode }}
        TAKOSUMI_ACTION_CLI_VERSION: ${{ inputs.cli-version }}
        TAKOSUMI_INSTALLER_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail

        case "$TAKOSUMI_ACTION_MODE" in
          apply)
            subcommand=(install "$TAKOSUMI_ACTION_SOURCE")
            ;;
          dry-run)
            subcommand=(install dry-run "$TAKOSUMI_ACTION_SOURCE")
            ;;
          *)
            echo "::error::mode must be 'apply' or 'dry-run'"
            exit 2
            ;;
        esac

        deno run -A "jsr:@takos/takosumi-cli@$TAKOSUMI_ACTION_CLI_VERSION" \
          "${subcommand[@]}" \
          --space "$TAKOSUMI_ACTION_SPACE" \
          --remote "$TAKOSUMI_ACTION_REMOTE_URL" \
          --token "$TAKOSUMI_INSTALLER_TOKEN"
