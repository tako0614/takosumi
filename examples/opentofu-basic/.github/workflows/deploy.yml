name: Takosumi OpenTofu Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "*.tf"
      - package.json
      - .github/workflows/deploy.yml

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned: v6.0.2 (2026)
        with:
          persist-credentials: false
      # TODO: pin SHA — tako0614/takosumi/actions/deploy@v1 (no published release tag yet)
      - uses: tako0614/takosumi/actions/deploy@v1
        with:
          source: .
          space: ${{ vars.TAKOSUMI_SPACE_ID }}
          remote-url: ${{ secrets.TAKOSUMI_REMOTE_URL }}
          token: ${{ secrets.TAKOSUMI_DEPLOY_CONTROL_TOKEN }}
          providers: ${{ vars.TAKOSUMI_PROVIDER_CONNECTIONS }}
