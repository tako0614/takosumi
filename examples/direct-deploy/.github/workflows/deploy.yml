name: Direct Takosumi Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .takosumi.yml
      - .github/workflows/deploy.yml

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: tako0614/takosumi/actions/deploy@v1
        with:
          source: .
          space: ${{ vars.TAKOSUMI_SPACE_ID }}
          remote-url: ${{ secrets.TAKOSUMI_REMOTE_URL }}
          token: ${{ secrets.TAKOSUMI_INSTALLER_TOKEN }}
